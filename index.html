<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Six Sigma BB — Flashcard Trainer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424; --border:#2e2e2e;
  --text:#e8e6e0; --text-dim:#888; --accent:#c8a96e;
  --t0:#555;    /* unsorted  */
  --t1:#5c9ee0; /* Know It   */
  --t2:#4caf6e; /* Good      */
  --t3:#c8a96e; /* Shaky     */
  --t4:#e05c5c; /* No Idea   */
  --define:#c8a96e; --measure:#5c9ee0; --analyze:#9b5ce0; --improve:#4caf6e; --control:#e0845c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;gap:16px;flex-wrap:wrap;}
.logo{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--accent);white-space:nowrap;}
.logo span{color:var(--text-dim);font-weight:400;font-size:.85rem;}
.header-center{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.tier-pill{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:.78rem;font-family:'DM Mono',monospace;transition:all .15s;color:var(--text-dim);}
.tier-pill:hover{background:var(--surface2);}
.tier-pill.active{color:#000;font-weight:600;}
.tier-pill.active[data-tier="all"]{background:var(--accent);border-color:var(--accent);}
.tier-pill.active[data-tier="0"]{background:var(--t0);border-color:var(--t0);color:var(--text);}
.tier-pill.active[data-tier="1"]{background:var(--t1);border-color:var(--t1);}
.tier-pill.active[data-tier="2"]{background:var(--t2);border-color:var(--t2);}
.tier-pill.active[data-tier="3"]{background:var(--t3);border-color:var(--t3);}
.tier-pill.active[data-tier="4"]{background:var(--t4);border-color:var(--t4);}
.pill-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.header-right{display:flex;gap:8px;align-items:center;}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:.78rem;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.btn:hover{background:var(--surface2);color:var(--text);}
.btn.danger:hover{background:#2d1414;border-color:#e05c5c;color:#e05c5c;}

/* ── APP LAYOUT ── */
.app{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 53px);}

/* ── SIDEBAR ── */
aside{border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);display:flex;flex-direction:column;}
.sidebar-section{padding:16px 0 8px;}
.sidebar-label{padding:4px 18px 8px;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);font-family:'DM Mono',monospace;}
.phase-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 18px;background:none;border:none;cursor:pointer;color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:.83rem;text-align:left;transition:all .15s;border-left:3px solid transparent;}
.phase-btn:hover{background:var(--surface2);color:var(--text);}
.phase-btn.active{color:var(--text);background:var(--surface2);}
.phase-btn.active[data-phase="all"]{border-left-color:var(--accent);}
.phase-btn.active[data-phase="Define"]{border-left-color:var(--define);}
.phase-btn.active[data-phase="Measure"]{border-left-color:var(--measure);}
.phase-btn.active[data-phase="Analyze"]{border-left-color:var(--analyze);}
.phase-btn.active[data-phase="Improve"]{border-left-color:var(--improve);}
.phase-btn.active[data-phase="Control"]{border-left-color:var(--control);}
.badge{font-family:'DM Mono',monospace;font-size:.68rem;background:var(--surface2);padding:2px 7px;border-radius:10px;color:var(--text-dim);}
.sidebar-divider{height:1px;background:var(--border);margin:4px 18px;}
.mode-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 18px;background:none;border:none;cursor:pointer;color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:.83rem;text-align:left;transition:all .15s;border-left:3px solid transparent;}
.mode-btn:hover{background:var(--surface2);color:var(--text);}
.mode-btn.active{background:var(--surface2);color:var(--text);border-left-color:var(--t1);}

/* ── MAIN ── */
main{display:flex;flex-direction:column;overflow:hidden;}
.toolbar{display:flex;align-items:center;gap:10px;padding:12px 24px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.toolbar-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;flex:1;min-width:0;}
.prog-wrap{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text-dim);}
.prog-bar{width:120px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}

/* ── FLASHCARD STUDY VIEW ── */
.study-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;overflow:hidden;gap:20px;}
.card-scene{width:100%;max-width:620px;perspective:1200px;cursor:pointer;}
.card-inner{position:relative;width:100%;min-height:300px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.card-inner.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;top:0;left:0;width:100%;min-height:300px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;border:1px solid var(--border);display:flex;flex-direction:column;padding:32px;background:var(--surface);}
.card-back{transform:rotateY(180deg);background:var(--surface2);}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.card-phase-tag{font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:4px;border:1px solid;}
.card-phase-tag.Define{color:var(--define);border-color:var(--define);}
.card-phase-tag.Measure{color:var(--measure);border-color:var(--measure);}
.card-phase-tag.Analyze{color:var(--analyze);border-color:var(--analyze);}
.card-phase-tag.Improve{color:var(--improve);border-color:var(--improve);}
.card-phase-tag.Control{color:var(--control);border-color:var(--control);}
.card-cat{font-size:.68rem;color:var(--text-dim);font-family:'DM Mono',monospace;}
.card-q{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;line-height:1.45;color:var(--text);}
.flip-hint{text-align:center;font-size:.68rem;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:1px;margin-top:12px;}
.card-a{flex:1;display:flex;flex-direction:column;justify-content:center;gap:10px;}
.ans-main{font-size:.98rem;font-weight:600;color:var(--text);line-height:1.55;}
.ans-detail{font-size:.82rem;color:var(--text-dim);line-height:1.6;}
.ans-formula{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--accent);background:var(--bg);padding:9px 13px;border-radius:7px;border-left:3px solid var(--accent);white-space:pre-wrap;}

/* ── TIER SORT BUTTONS ── */
.sort-wrap{width:100%;max-width:620px;display:flex;flex-direction:column;gap:10px;}
.sort-label{font-size:.68rem;color:var(--text-dim);font-family:'DM Mono',monospace;letter-spacing:1px;text-align:center;}
.sort-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.sort-btn{padding:10px 6px;border-radius:9px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px;opacity:.5;}
.sort-btn:hover{opacity:1;transform:translateY(-2px);}
.sort-btn.current-tier{opacity:1;outline:2px solid currentColor;outline-offset:2px;}
.sort-btn[data-t="1"]{color:var(--t1);}
.sort-btn[data-t="1"]:hover,.sort-btn[data-t="1"].current-tier{background:#0a1422;border-color:var(--t1);}
.sort-btn[data-t="2"]{color:var(--t2);}
.sort-btn[data-t="2"]:hover,.sort-btn[data-t="2"].current-tier{background:#0e1e14;border-color:var(--t2);}
.sort-btn[data-t="3"]{color:var(--t3);}
.sort-btn[data-t="3"]:hover,.sort-btn[data-t="3"].current-tier{background:#1e1a0a;border-color:var(--t3);}
.sort-btn[data-t="4"]{color:var(--t4);}
.sort-btn[data-t="4"]:hover,.sort-btn[data-t="4"].current-tier{background:#2d1414;border-color:var(--t4);}
.sort-icon{font-size:1.3rem;}
.sort-name{font-size:.72rem;font-weight:600;}
.sort-key{font-size:.6rem;opacity:.6;font-family:'DM Mono',monospace;}

/* ── BROWSE VIEW ── */
.browse-outer{flex:1;overflow-y:auto;padding:20px 24px;}
.browse-search{width:100%;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:.85rem;font-family:'DM Sans',sans-serif;margin-bottom:16px;}
.browse-search:focus{outline:1px solid var(--accent);}
.browse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.bc{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px 16px 12px;cursor:pointer;transition:all .15s;position:relative;border-top:3px solid var(--t0);}
.bc:hover{background:var(--surface2);transform:translateY(-1px);}
.bc[data-tier="1"]{border-top-color:var(--t1);}
.bc[data-tier="2"]{border-top-color:var(--t2);}
.bc[data-tier="3"]{border-top-color:var(--t3);}
.bc[data-tier="4"]{border-top-color:var(--t4);}
.bc-q{font-size:.87rem;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:6px;}
.bc-a{font-size:.75rem;color:var(--text-dim);line-height:1.5;margin-bottom:10px;}
.bc-footer{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.tag{font-size:.6rem;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;}
.tag.Define{background:rgba(200,169,110,.15);color:var(--define);}
.tag.Measure{background:rgba(92,158,224,.15);color:var(--measure);}
.tag.Analyze{background:rgba(155,92,224,.15);color:var(--analyze);}
.tag.Improve{background:rgba(76,175,110,.15);color:var(--improve);}
.tag.Control{background:rgba(224,132,92,.15);color:var(--control);}
.tier-tag{font-size:.6rem;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-weight:600;}
.tier-tag[data-tier="0"]{background:rgba(85,85,85,.2);color:var(--t0);}
.tier-tag[data-tier="1"]{background:rgba(92,158,224,.2);color:var(--t1);}
.tier-tag[data-tier="2"]{background:rgba(76,175,110,.2);color:var(--t2);}
.tier-tag[data-tier="3"]{background:rgba(200,169,110,.2);color:var(--t3);}
.tier-tag[data-tier="4"]{background:rgba(224,92,92,.2);color:var(--t4);}

/* ── RESORT MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:480px;width:90%;display:flex;flex-direction:column;gap:16px;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;}
.modal-q{font-size:.9rem;color:var(--text-dim);line-height:1.5;}
.modal-tiers{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.modal-tier-btn{padding:12px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;transition:all .15s;text-align:left;display:flex;align-items:center;gap:10px;}
.modal-tier-btn:hover{transform:translateY(-1px);}
.modal-tier-btn[data-t="0"]:hover{border-color:var(--t0);}
.modal-tier-btn[data-t="1"]:hover{border-color:var(--t1);}
.modal-tier-btn[data-t="2"]:hover{border-color:var(--t2);}
.modal-tier-btn[data-t="3"]:hover{border-color:var(--t3);}
.modal-tier-btn[data-t="4"]:hover{border-color:var(--t4);}
.modal-tier-btn.selected{outline:2px solid;}
.modal-tier-btn.selected[data-t="0"]{outline-color:var(--t0);}
.modal-tier-btn.selected[data-t="1"]{outline-color:var(--t1);}
.modal-tier-btn.selected[data-t="2"]{outline-color:var(--t2);}
.modal-tier-btn.selected[data-t="3"]{outline-color:var(--t3);}
.modal-tier-btn.selected[data-t="4"]{outline-color:var(--t4);}
.mt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;}

/* ── STATS VIEW ── */
.stats-outer{flex:1;overflow-y:auto;padding:20px 24px;}
.stats-top{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px;}
.stat-box .sl{font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:8px;}
.stat-box .sv{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;}
.tier-overview{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px;}
.tier-box{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px;text-align:center;}
.tier-box .tb-name{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;font-family:'DM Mono',monospace;margin-bottom:6px;}
.tier-box .tb-val{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;margin-bottom:8px;}
.tier-box .tb-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.tier-box .tb-fill{height:100%;border-radius:2px;}
.phase-matrix{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;}
.pm-header{display:grid;grid-template-columns:120px repeat(5,1fr);border-bottom:1px solid var(--border);}
.pm-cell{padding:10px 12px;font-size:.7rem;font-family:'DM Mono',monospace;color:var(--text-dim);}
.pm-row{display:grid;grid-template-columns:120px repeat(5,1fr);border-bottom:1px solid var(--border);}
.pm-row:last-child{border-bottom:none;}
.pm-row:hover{background:var(--surface2);}
.pm-phase{padding:10px 12px;font-size:.78rem;font-weight:600;}
.pm-count{padding:10px 12px;font-size:.82rem;font-family:'DM Mono',monospace;text-align:center;}

/* ── MISC ── */
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 18px;font-size:.82rem;opacity:0;transform:translateY(8px);transition:all .25s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:.9rem;flex-direction:column;gap:8px;}
@media(max-width:700px){
  /* hide desktop sidebar */
  aside{display:none!important;}
  /* full width app, leave room for bottom nav */
  .app{grid-template-columns:1fr;height:calc(100vh - 53px - 56px);}
  /* compact header */
  header{padding:10px 14px;gap:8px;}
  .logo span{display:none;}
  .header-center{display:none;}  /* tier pills move to mobile strip */
  .header-right{gap:6px;}
  /* mobile tier strip */
  #mobile-tier-strip{display:flex;}
  /* mobile phase bar */
  #mobile-phase-bar{display:flex;}
  /* bottom nav */
  #bottom-nav{display:flex;}
  /* stack stats */
  .tier-overview{grid-template-columns:repeat(3,1fr);}
  .phase-breakdown,.phase-matrix .pm-header,.phase-matrix .pm-row{font-size:.75rem;}
  /* card tweaks */
  .study-wrap{padding:14px 12px;gap:12px;}
  .card-face{padding:22px 18px;}
  .card-q{font-size:1.1rem;}
  .ans-main{font-size:.9rem;}
  .sort-btns{grid-template-columns:repeat(2,1fr);}
  /* browse tweaks */
  .browse-outer{padding:12px;}
  .browse-grid{grid-template-columns:1fr;}
  /* toolbar */
  .toolbar{padding:10px 14px;flex-wrap:wrap;gap:6px;}
  .toolbar-title{font-size:1rem;}
  .prog-wrap .prog-bar{width:80px;}
}
@media(min-width:701px){
  #mobile-tier-strip{display:none!important;}
  #mobile-phase-bar{display:none!important;}
  #bottom-nav{display:none!important;}
}

  /* ── MOBILE TIER STRIP ── */
  #mobile-tier-strip{
    display:none;overflow-x:auto;gap:6px;padding:8px 14px;
    border-bottom:1px solid var(--border);background:var(--bg);
    flex-shrink:0;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  #mobile-tier-strip::-webkit-scrollbar{display:none;}
  .m-tier-btn{
    flex-shrink:0;display:flex;align-items:center;gap:5px;
    padding:6px 12px;border-radius:16px;border:1px solid var(--border);
    background:var(--surface);font-size:.75rem;font-family:'DM Mono',monospace;
    color:var(--text-dim);cursor:pointer;white-space:nowrap;transition:all .15s;
  }
  .m-tier-btn.active{color:#000;font-weight:600;}
  .m-tier-btn.active[data-tier="all"]{background:var(--accent);border-color:var(--accent);}
  .m-tier-btn.active[data-tier="0"]{background:var(--t0);border-color:var(--t0);color:var(--text);}
  .m-tier-btn.active[data-tier="1"]{background:var(--t1);border-color:var(--t1);}
  .m-tier-btn.active[data-tier="2"]{background:var(--t2);border-color:var(--t2);}
  .m-tier-btn.active[data-tier="3"]{background:var(--t3);border-color:var(--t3);}
  .m-tier-btn.active[data-tier="4"]{background:var(--t4);border-color:var(--t4);}

  /* ── MOBILE PHASE BAR ── */
  #mobile-phase-bar{
    display:none;overflow-x:auto;gap:6px;padding:6px 14px;
    border-bottom:1px solid var(--border);background:var(--surface);
    flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  #mobile-phase-bar::-webkit-scrollbar{display:none;}
  .m-phase-btn{
    flex-shrink:0;display:flex;align-items:center;gap:5px;
    padding:5px 11px;border-radius:12px;border:1px solid var(--border);
    background:var(--surface2);font-size:.73rem;font-family:'DM Sans',sans-serif;
    color:var(--text-dim);cursor:pointer;white-space:nowrap;transition:all .15s;
  }
  .m-phase-btn.active{color:var(--text);background:var(--surface2);}
  .m-phase-btn.active[data-phase="all"]{border-color:var(--accent);color:var(--accent);}
  .m-phase-btn.active[data-phase="Define"]{border-color:var(--define);color:var(--define);}
  .m-phase-btn.active[data-phase="Measure"]{border-color:var(--measure);color:var(--measure);}
  .m-phase-btn.active[data-phase="Analyze"]{border-color:var(--analyze);color:var(--analyze);}
  .m-phase-btn.active[data-phase="Improve"]{border-color:var(--improve);color:var(--improve);}
  .m-phase-btn.active[data-phase="Control"]{border-color:var(--control);color:var(--control);}

  /* ── BOTTOM NAV ── */
  #bottom-nav{
    display:none;position:fixed;bottom:0;left:0;right:0;
    height:56px;background:var(--surface);border-top:1px solid var(--border);
    z-index:200;
  }
  .bnav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:3px;background:none;border:none;
    cursor:pointer;color:var(--text-dim);font-family:'DM Sans',sans-serif;
    font-size:.62rem;transition:color .15s;padding:0;
  }
  .bnav-btn.active{color:var(--accent);}
  .bnav-icon{font-size:1.3rem;line-height:1;}

</style>
</head>
<body>

<header>
  <div class="logo">Six Sigma BB <span>/ Flashcard Trainer</span></div>
  <div class="header-center" id="tier-filter-pills">
    <button class="tier-pill active" data-tier="all" onclick="setTierFilter('all')">
      <span class="pill-dot" style="background:var(--accent)"></span>All <span id="pill-all">206</span>
    </button>
    <button class="tier-pill" data-tier="0" onclick="setTierFilter('0')">
      <span class="pill-dot" style="background:var(--t0)"></span>Unsorted <span id="pill-0">0</span>
    </button>
    <button class="tier-pill" data-tier="1" onclick="setTierFilter('1')">
      <span class="pill-dot" style="background:var(--t1)"></span>Know It <span id="pill-1">0</span>
    </button>

<script>
const CARDS = [

// ── DEFINE: Six Sigma Basics ──────────────────────────────
{phase:"Define",cat:"Six Sigma Basics",
q:"What is Six Sigma?",
a:"A data-driven framework for eliminating defects and reducing variation to improve process performance and business competitiveness.",
detail:"Quality philosophy + management technique. Not a standard or certification by itself. Targets 3.4 DPMO. Uses DMAIC as its problem-solving engine.",
formula:"6σ process: Cp ≥ 2.0, Cpk ≥ 2.0, DPMO = 3.4"},

{phase:"Define",cat:"Six Sigma Basics",
q:"Who coined 'Six Sigma' and when? Where did it gain mainstream adoption?",
a:"Bill Smith coined it at Motorola in 1986. Jack Welch made it a company-wide strategy at GE in the early 1990s, reporting $2.5 billion/year in benefits.",
detail:"Smith is called the 'Father of Six Sigma.' The methodology evolved from MAIC (created by Smith & Mikel Harry) to DMAIC."},

{phase:"Define",cat:"Six Sigma Basics",
q:"What does the '6' in Six Sigma mean?",
a:"Six standard deviations (sigmas) fit between the process mean and the nearest specification limit — only 3.4 defects per million opportunities escape.",
detail:"A process with ±3σ limits (3-sigma) yields ~66,807 DPMO. Moving to ±6σ reduces that to 3.4 DPMO. The 1.5σ long-term shift is already accounted for in published tables."},

{phase:"Define",cat:"Six Sigma Basics",
q:"What is the 68-95-99.7 rule (Empirical Rule)?",
a:"In a normal distribution: 68% of data falls within ±1σ, 95% within ±2σ, and 99.7% within ±3σ of the mean.",
detail:"A 6σ process captures 99.9999966% within spec. Do NOT assume symmetric data is normal — many distributions are symmetric but non-normal."},

{phase:"Define",cat:"Six Sigma Basics",
q:"What does DMAIC stand for and what is it?",
a:"Define, Measure, Analyze, Improve, Control — Six Sigma's structured, data-driven, five-phase problem-solving cycle.",
detail:"Must be followed in sequence. All five steps are used. It is data-driven and uses tollgate reviews at the end of each phase. DMAIC can also be used outside of Six Sigma contexts."},

{phase:"Define",cat:"Six Sigma Basics",
q:"What are DMAIC Tollgate Reviews?",
a:"Phase-gate meetings at the end of each DMAIC phase where sponsors and stakeholders review progress and give (or withhold) permission to advance.",
detail:"Participants: champions, sponsors, MBBs, stakeholders. Purpose: report progress, seek resources, receive permission to proceed. Sponsor can discontinue a project at any tollgate."},

{phase:"Define",cat:"Six Sigma Basics",
q:"What is Y = f(x) in Six Sigma?",
a:"The causal model: the output Y is a function of the inputs x. Improving Y requires identifying and controlling the critical x's.",
detail:"Also written CTQ = f(KPIVs). Shifts focus from symptom (Y) to root causes (x's). This is the fundamental problem-solving strategy of Six Sigma."},

{phase:"Define",cat:"Six Sigma Basics",
q:"What is the difference between Six Sigma and DMAIC?",
a:"Six Sigma is the overall philosophy/methodology for reducing defects and variation. DMAIC is the specific five-step problem-solving process used within Six Sigma projects.",
detail:"Six Sigma can also use DMADV (Define, Measure, Analyze, Design, Verify) for new processes/products, also called DFSS (Design for Six Sigma)."},

// ── DEFINE: Roles ─────────────────────────────────────────
{phase:"Define",cat:"Roles & Responsibilities",
q:"What is the role of a Six Sigma Sponsor?",
a:"A senior executive who owns the business case, defines the problem statement, validates the project charter, and approves DMAIC tollgates.",
detail:"Liaison between team and senior management. Secures non-Six-Sigma resources. Must be engaged throughout — the sponsor is the project's traffic light."},

{phase:"Define",cat:"Roles & Responsibilities",
q:"What is the role of a Six Sigma Champion?",
a:"A middle/senior executive who promotes continuous improvement, secures BB training/mentorship, resolves cross-functional issues, and may also sponsor projects.",
detail:"Trained in Six Sigma basics. Often a former Black Belt or Master Black Belt. Responsible for keeping a portfolio of projects on track at a macro level."},

{phase:"Define",cat:"Roles & Responsibilities",
q:"What is the Six Sigma Black Belt's role?",
a:"100%-allocated professional who leads DMAIC projects, applies statistical and process tools, trains Green Belts, and drives organizational change.",
detail:"Has project management, statistical analysis, and soft-skills for change management. May also serve as internal consultant across multiple teams simultaneously."},

{phase:"Define",cat:"Roles & Responsibilities",
q:"What is a Master Black Belt (MBB)?",
a:"A highly experienced BB who mentors Black Belts, manages a portfolio of initiatives, and is the organization's top Six Sigma methodology expert.",
detail:"100% allocated. Reports to Champions. Removes obstacles from BB teams. Often sets statistical and methodological standards across the organization."},

{phase:"Define",cat:"Roles & Responsibilities",
q:"What is the Process Owner's role in Six Sigma?",
a:"The business leader responsible for the process targeted by a project, who takes ownership after the DMAIC team hands off improvements.",
detail:"Sometimes also serves as the sponsor. Critical that the process owner is engaged during the project — they must sustain the improvements after the BB leaves."},

{phase:"Define",cat:"Roles & Responsibilities",
q:"What is a Six Sigma Green Belt?",
a:"A partially-allocated professional with introductory Six Sigma training who may lead smaller projects or serve as a team member on a BB-led project.",
detail:"Green belts typically lead smaller-scope projects or support BBs. They have solid statistical training but less depth than a Black Belt."},

// ── DEFINE: Voice of Customer ─────────────────────────────
{phase:"Define",cat:"Voice of Customer",
q:"What is Voice of Customer (VoC)?",
a:"The process of capturing customers' needs, wants, and expectations in their own words, used to define quality requirements.",
detail:"Starts in Define phase, continues through Measure and Analyze. Methods: surveys, interviews, focus groups, direct observation (Gemba walks), complaint logs, social media."},

{phase:"Define",cat:"Voice of Customer",
q:"What is the difference between proactive and reactive VoC collection?",
a:"Proactive: reaching out to customers before/during an experience (surveys, interviews). Reactive: capturing feedback after an experience (complaint logs, warranty data, reviews).",
detail:"Both are valuable. Proactive VoC is preferred for prevention; reactive VoC reveals current failure modes. CSAT and NPS are common proactive survey tools."},

{phase:"Define",cat:"Voice of Customer",
q:"What is Voice of the Business (VoB)?",
a:"The organization's own requirements — financial targets, strategic goals, regulatory compliance, operational constraints.",
detail:"Must be balanced with VoC. Six Sigma projects must satisfy both. A project that satisfies customers but destroys margin is not a success."},

{phase:"Define",cat:"Voice of Customer",
q:"What is Voice of the Employee (VoE)?",
a:"Feedback and insights from employees about process problems, inefficiencies, and improvement opportunities.",
detail:"Employees who work in a process every day often have the best insight into root causes. VoE should be actively gathered alongside VoC."},

{phase:"Define",cat:"Voice of Customer",
q:"How is raw VoC converted into measurable requirements?",
a:"Using a CTQ Tree (Critical to Quality Tree): raw customer statements → quality drivers → CTQ characteristics with specific, measurable limits.",
detail:"Example: 'fast delivery' (raw VoC) → speed (driver) → 'delivery within 2 business days' (CTQ). Each CTQ must be measurable, specific, and have an upper/lower limit."},

// ── DEFINE: Process Tools ─────────────────────────────────
{phase:"Define",cat:"Process Tools",
q:"What does SIPOC stand for and when is it used?",
a:"Supplier, Input, Process, Output, Customer — a high-level process map used in the Define phase to establish project scope and show how a process serves the customer.",
detail:"Typically 5-7 high-level process steps. Sometimes built POCIS order (process first). Helps team and sponsor agree on boundaries. Identifies KPIVs (inputs) and KPOVs (outputs)."},

{phase:"Define",cat:"Process Tools",
q:"What is a Process Map and what are the two main types?",
a:"A graphical representation of a process showing steps, decisions, inputs, and outputs. Types: Process Flowchart (simple sequence) and Deployment/Swim-Lane Flowchart (shows roles/departments).",
detail:"Swim-lane charts show handoffs between departments — excellent for finding waste at boundaries. Process maps are foundational for identifying bottlenecks, delays, and rework loops."},

{phase:"Define",cat:"Process Tools",
q:"What is a CTQ (Critical to Quality)?",
a:"A measurable characteristic of a product/service that is critical to meeting customer requirements — the 'must-haves' derived from VoC.",
detail:"Each CTQ must have a target value and specification limits (USL/LSL). CTQs are inputs to the project's Y metric. Derived using the CTQ Tree from raw VoC statements."},

{phase:"Define",cat:"Process Tools",
q:"What is a Pareto Chart and what is the 80/20 rule?",
a:"A bar chart ranking defect categories from most to least frequent, with a cumulative line, used to identify the 'vital few' causes driving most problems.",
detail:"Based on Vilfredo Pareto's finding that 80% of problems come from 20% of causes. Bars are ordered high-to-low left-to-right. Helps teams focus effort on highest-impact issues."},

{phase:"Define",cat:"Process Tools",
q:"What is a Project Charter and what does it contain?",
a:"A living document that formally authorizes the project, containing: problem statement, goal statement (SMART), business case, scope, team, timeline, and financial case.",
detail:"Created in Define, updated throughout the project. The problem statement should NOT suggest causes or solutions. Goal should be SMART (Specific, Measurable, Achievable, Relevant, Time-bound). Requires sponsor approval."},

// ── DEFINE: Metrics ───────────────────────────────────────
{phase:"Define",cat:"Metrics",
q:"What is Cost of Poor Quality (COPQ)?",
a:"The total financial loss from producing defective products or services — the sum of internal and external failure costs.",
detail:"COPQ is a subset of Cost of Quality (CoQ). CoQ = Prevention + Appraisal + Internal Failure + External Failure. COPQ = Internal + External failure costs only."},

{phase:"Define",cat:"Metrics",
q:"What are the four categories of Cost of Quality (CoQ)?",
a:"Prevention (training, quality planning), Appraisal (inspection, testing, calibration), Internal Failure (rework, scrap), External Failure (warranty, recalls, loss of goodwill).",
detail:"The goal: shift spending from failure costs to prevention costs. $1 spent on prevention saves ~$10-100 in failure costs. Pareto the quality costs to prioritize action."},

{phase:"Define",cat:"Metrics",
q:"What is DPU (Defects Per Unit)?",
a:"The average number of defects per unit produced, regardless of how many opportunities exist per unit.",
formula:"DPU = Total Defects / Total Units",
detail:"Example: 200 defects across 1,000 units = DPU of 0.20. Simple but doesn't account for process complexity."},

{phase:"Define",cat:"Metrics",
q:"What is DPO (Defects Per Opportunity)?",
a:"The ratio of defects to total opportunities (units × opportunities per unit) — the foundation for DPMO.",
formula:"DPO = Defects / (Units × Opportunities per unit)",
detail:"Normalizes for process complexity. A complex product with many CTQs will naturally have a higher chance of defects; DPO accounts for this."},

{phase:"Define",cat:"Metrics",
q:"What is DPMO (Defects Per Million Opportunities)?",
a:"The number of defects per million process opportunities — the standard Six Sigma performance measure used to compare processes regardless of complexity.",
formula:"DPMO = DPO × 1,000,000 = (Defects / Opportunities) × 1,000,000",
detail:"A 6σ process = 3.4 DPMO. A 3σ process ≈ 66,807 DPMO. The sigma level is derived from DPMO using a Z-table (accounting for 1.5σ shift)."},

{phase:"Define",cat:"Metrics",
q:"What is the difference between a Defect and a Defective unit?",
a:"A defect is a single nonconformance on a unit. A defective is a whole unit that contains one or more defects and fails acceptance.",
detail:"One unit can have multiple defects but is counted as one defective. DPU counts defects; DPMO uses opportunities; proportion defective uses defectives."},

{phase:"Define",cat:"Metrics",
q:"What is First Time Yield (FTY)?",
a:"The percentage of units that pass through a single process step on the first attempt, without rework or scrap.",
formula:"FTY = Units out (without rework) / Units in",
detail:"FTY hides rework. A step with 100% FTY is truly efficient. A step with 80% FTY that reworks 20% looks like 100% in the final count — this is the 'hidden factory.'"},

{phase:"Define",cat:"Metrics",
q:"What is Rolled Throughput Yield (RTY)?",
a:"The probability that a unit passes through ALL process steps without any defects or rework — exposes the hidden factory.",
formula:"RTY = FTY₁ × FTY₂ × FTY₃ × ... × FTYₙ",
detail:"Example: 3 steps each at 90% FTY → RTY = 0.9³ = 72.9%. RTY is always ≤ the lowest individual FTY. Critical for understanding true process efficiency."},

{phase:"Define",cat:"Metrics",
q:"What is Cycle Time in Six Sigma?",
a:"The total time from the start to the end of a process step or entire process — includes both value-added and non-value-added time.",
detail:"Touch time (value-added time) is always less than cycle time. Takt time = customer demand rate. Lead time = total elapsed time from order to delivery. Reducing cycle time is a core Lean objective."},

// ── DEFINE: Lean ──────────────────────────────────────────
{phase:"Define",cat:"Lean",
q:"What are the 7 classic wastes (Muda)? Give the mnemonic.",
a:"Transportation, Inventory, Motion, Waiting, Overproduction, Over-processing, Defects. Mnemonic: TIMWOOD (or DOWNTIME adding Non-utilized talent).",
detail:"Overproduction is considered the worst waste — it causes or hides all others. The 8th waste (in DOWNTIME) is Non-utilized talent/skills of people."},

{phase:"Define",cat:"Lean",
q:"What are Mura, Muri, and Muda?",
a:"Muda = waste (non-value-adding activities). Muri = overburden (unreasonable demands on people/machines). Mura = unevenness/irregularity in flow.",
detail:"The 3Ms of Toyota Production System. Mura and Muri both cause Muda. Eliminating all three creates smooth, efficient flow. Mura is often caused by uneven customer demand or batch processing."},

{phase:"Define",cat:"Lean",
q:"What are the 5S steps?",
a:"Sort (remove unneeded items), Set in Order/Straighten (organize needed items), Shine (clean), Standardize (document the standard), Sustain/Self-Discipline (maintain the standard).",
detail:"Foundation of Lean workplace organization. Creates visual management. The hardest S is Sustain — it requires ongoing discipline and management support. Used in Define and Control phases."},

{phase:"Define",cat:"Lean",
q:"What is the key difference between Lean and Six Sigma?",
a:"Lean targets waste and flow (speed/efficiency — doing things faster). Six Sigma targets variation and defects (quality/accuracy — doing things right).",
detail:"Lean Six Sigma combines both. Use Lean to eliminate non-value-added steps and improve flow, then use Six Sigma to reduce variation in the remaining steps. Lean is faster to implement; Six Sigma is more data-intensive."},

{phase:"Define",cat:"Lean",
q:"What is Value Stream Mapping (VSM)?",
a:"A Lean tool that maps the complete flow of materials and information required to deliver a product, distinguishing value-added from non-value-added steps.",
detail:"Used in Measure phase. Shows cycle times, wait times, inventory levels, and information flows. Results in a current-state map and a future-state map with improvement targets."},

{phase:"Define",cat:"Lean",
q:"What are the three criteria for a value-added step?",
a:"(1) The customer is willing to pay for it. (2) It physically changes the product or service. (3) It is done right the first time.",
detail:"Any step that fails any of these three tests is non-value-added (waste). Non-value-added steps should be eliminated, simplified, or automated where possible."},

// ── DEFINE: Financial & Project Selection ─────────────────
{phase:"Define",cat:"Financial Measures",
q:"What is ROI (Return on Investment)?",
a:"A backward-looking measure of how profitable a project was relative to its cost.",
formula:"ROI = (End Value − Cost) / Cost",
detail:"Used after a project to measure financial success. If ROI > 0%, the project generated more than it cost. Compare project ROI to benchmark to assess relative performance."},

{phase:"Define",cat:"Financial Measures",
q:"What is Net Present Value (NPV)?",
a:"The present value of all future cash flows from a project minus the initial investment — used to decide if a multi-year project is financially justified.",
detail:"NPV > 0 means the project adds value; NPV < 0 means it destroys value. Accounts for the time value of money. A forward-looking measure used in project selection."},

{phase:"Define",cat:"Financial Measures",
q:"What is a Cost-Benefit Analysis (CBA) in Six Sigma?",
a:"A forward-looking comparison of expected project costs vs. expected benefits used to justify whether a project should proceed.",
formula:"If Benefits > Costs → project is worthwhile",
detail:"Used in both Define (to justify the project) and Control (to confirm results). Should include one-time costs, ongoing costs, one-time benefits, and ongoing benefits."},

// ── MEASURE: Process Definition ───────────────────────────
{phase:"Measure",cat:"Process Tools",
q:"What is a Cause & Effect (Fishbone/Ishikawa) Diagram?",
a:"A visual brainstorming tool showing all potential causes of a problem organized into the 6Ms: Man, Machine, Material, Method, Measurement, Mother Nature (Environment).",
detail:"Introduced by Kaoru Ishikawa (1968). The 'effect' is placed at the fish's head; 'bones' are cause categories; sub-bones are specific causes. One of the 7 basic quality tools. Used in Measure/Analyze phases."},

{phase:"Measure",cat:"Process Tools",
q:"What are the 6Ms of the Fishbone diagram?",
a:"Man (people), Machine (equipment), Material (raw inputs), Method (procedures), Measurement (gauges/data), Mother Nature (environment/conditions).",
detail:"Also called 5M1P (5Ms and 1P where P = Policy). For service processes, the categories are sometimes adapted to People, Process, Policy, Plant, Procedures, Patrons."},

{phase:"Measure",cat:"Process Tools",
q:"What is an X-Y Diagram (Cause & Effect Matrix)?",
a:"A prioritization matrix that scores process inputs (X's) against process outputs (Y's) weighted by output importance, to identify the most critical input variables.",
detail:"Outputs are listed across the top with importance weights (1-10). Inputs are listed down the side. Each cell gets a relationship score. Row totals identify which X's to investigate first. Feeds directly into FMEA."},

// ── MEASURE: FMEA ─────────────────────────────────────────
{phase:"Measure",cat:"FMEA",
q:"What is FMEA and what is its primary output?",
a:"Failure Modes and Effects Analysis — a proactive risk tool that identifies potential failure modes, their effects, and causes. Primary output: Risk Priority Number (RPN) for each failure mode.",
formula:"RPN = Severity × Occurrence × Detection (each scored 1–10)",
detail:"Higher RPN = higher priority to address. Used in Analyze (to find current issues) and Improve (to evaluate proposed solutions). Types: DFMEA (design), PFMEA (process), SFMEA (system)."},

{phase:"Measure",cat:"FMEA",
q:"In FMEA scoring, what do Severity, Occurrence, and Detection represent?",
a:"Severity: impact on customer if failure occurs. Occurrence: probability the failure will happen. Detection: ability of current controls to catch the failure before reaching customer.",
detail:"CRITICAL: Detection is INVERSE — a score of 1 means easily detectable; 10 means nearly impossible to detect. All three are scored 1-10. RPN = S × O × D."},

{phase:"Measure",cat:"FMEA",
q:"What are the three types of FMEA?",
a:"Design FMEA (DFMEA) — analyzes the product/service design. Process FMEA (PFMEA) — analyzes the manufacturing/delivery process. System FMEA (SFMEA) — analyzes interrelationships between subsystems.",
detail:"Sequence: SFMEA before design → DFMEA during design → PFMEA after design, before production. PFMEA is most common in Six Sigma projects. Destructive testing requires Nested Gage R&R; non-destructive uses Crossed."},

// ── MEASURE: Statistics ───────────────────────────────────
{phase:"Measure",cat:"Statistics",
q:"What are the measures of central tendency?",
a:"Mean (arithmetic average), Median (middle value when sorted), Mode (most frequent value).",
detail:"Mean is most sensitive to outliers. Median is robust — preferred for skewed distributions. In a normal distribution, mean = median = mode. The mean is used in most Six Sigma formulas."},

{phase:"Measure",cat:"Statistics",
q:"What are the measures of dispersion?",
a:"Range (max − min), Variance (σ²), Standard Deviation (σ), and Interquartile Range (IQR = Q3 − Q1).",
formula:"σ = √[Σ(xᵢ − μ)² / N]  (population)   s = √[Σ(xᵢ − x̄)² / (n−1)]  (sample)",
detail:"Standard deviation is used more than variance because it is in the same units as the data. Sample formula divides by (n-1) — Bessel's correction — to reduce bias."},

{phase:"Measure",cat:"Statistics",
q:"What is the difference between a Population and a Sample in statistics?",
a:"Population: the entire group of interest (all units). Sample: a subset of the population used to make inferences about the whole.",
detail:"Population parameters: μ (mean), σ (std dev), N (size). Sample statistics: x̄ (mean), s (std dev), n (size). We almost always work with samples in Six Sigma."},

{phase:"Measure",cat:"Statistics",
q:"What are the two main types of data in Six Sigma?",
a:"Continuous (variable): measured on a scale — can take any value (weight, temperature, diameter). Discrete (attribute): counted in whole numbers or categories (pass/fail, number of defects).",
detail:"Continuous data is preferred — it is more information-rich and enables more powerful statistical tests (t-tests, ANOVA). Attribute data requires larger sample sizes for the same statistical power."},

{phase:"Measure",cat:"Statistics",
q:"What is a Normal (Gaussian) Distribution?",
a:"A symmetric, bell-shaped continuous probability distribution fully described by its mean (μ) and standard deviation (σ), where mean = median = mode.",
detail:"Most common distribution in Six Sigma. The 68-95-99.7 rule applies. Required assumption for many parametric tests (t-test, ANOVA, regression). Test for normality before applying these tests."},

{phase:"Measure",cat:"Statistics",
q:"What are the common data distributions in Six Sigma?",
a:"Normal (continuous, symmetric). Binomial (discrete, pass/fail with replacement). Poisson (discrete, count of rare events). Lognormal (continuous, right-skewed — use log transform). Exponential (continuous, time between events).",
detail:"Hypergeometric: sampling without replacement. Weibull: reliability/failure time analysis. Choosing the correct distribution is essential for valid statistical analysis."},

{phase:"Measure",cat:"Statistics",
q:"What is Graphical Analysis in Six Sigma?",
a:"Using visual tools to understand data distributions, relationships, and patterns before applying statistical tests.",
detail:"Key tools: Histogram (shape/distribution), Box Plot (spread, median, outliers), Scatter Plot (relationship between X and Y), Run Chart (time-ordered data for trends), Normal Probability Plot (test for normality)."},

// ── MEASURE: Sampling ─────────────────────────────────────
{phase:"Measure",cat:"Sampling",
q:"What are the four types of Probability Sampling?",
a:"Simple Random (every unit has equal chance), Stratified (random within defined subgroups), Systematic (every nth unit), Cluster (randomly select whole groups/clusters).",
detail:"Probability sampling is preferred — it allows statistical inference. Non-probability sampling (convenience, purposive, quota, snowball) is faster but introduces bias and limits generalizability."},

{phase:"Measure",cat:"Sampling",
q:"What is Sampling Error and how is it reduced?",
a:"The deviation between the sample estimate and the true population parameter — inherent in any sampling process.",
detail:"Reduced by: larger sample sizes, proper randomization, and choosing the right sampling method. Cannot be eliminated entirely, only minimized. Different from measurement error."},

{phase:"Measure",cat:"Sampling",
q:"What is Rational Subgrouping?",
a:"Organizing data into subgroups produced under similar conditions to isolate within-subgroup (common cause) variation from between-subgroup (special cause) variation.",
detail:"Critical for valid control charts. Subgroups should be homogeneous — produced by the same machine, operator, and shift. Subgroup size and frequency affect the sensitivity of control charts."},

// ── MEASURE: MSA ──────────────────────────────────────────
{phase:"Measure",cat:"MSA",
q:"What is Measurement System Analysis (MSA)?",
a:"A study to determine how much of the observed process variation comes from the measurement system itself versus the actual process.",
detail:"If the measurement system contributes > 30% of total variation, it is unacceptable and must be improved before proceeding with process analysis. Must be done before collecting baseline data."},

{phase:"Measure",cat:"MSA",
q:"What is Gage R&R and what does it measure?",
a:"Gage Repeatability & Reproducibility — quantifies measurement variation due to the gage itself (repeatability) and variation between operators using the same gage (reproducibility).",
formula:"Total Measurement Variation = Repeatability (EV) + Reproducibility (AV) + Part Variation",
detail:"EV = Equipment Variation. AV = Appraiser Variation. GR&R% = (Gage Variation / Total Variation) × 100. < 10% is ideal; 10-30% may be acceptable; > 30% is unacceptable."},

{phase:"Measure",cat:"MSA",
q:"What is the difference between Accuracy and Precision in measurement?",
a:"Accuracy = closeness to the true/reference value (freedom from bias). Precision = consistency of repeated measurements (freedom from random variation).",
detail:"A process can be precise but not accurate (tight cluster, wrong location) or accurate but not precise (scattered around true value). Six Sigma aims for both."},

{phase:"Measure",cat:"MSA",
q:"What is Bias in a measurement system?",
a:"A systematic offset between the average measured value and the true (reference) value — a consistent error in one direction.",
detail:"Bias ≠ precision. Bias is correctable through calibration. Linearity = how bias changes across the measurement range. Stability = how bias changes over time."},

{phase:"Measure",cat:"MSA",
q:"What are the three types of Gage R&R studies?",
a:"Crossed (each operator measures each part — for non-destructive testing), Nested (each operator measures unique parts — for destructive testing), Expanded (more than 2 factors).",
detail:"Crossed is most common. Nested is used when measurement destroys the part (tensile testing, taste tests). Both require balanced designs with random factors."},

// ── MEASURE: Process Capability ───────────────────────────
{phase:"Measure",cat:"Process Capability",
q:"What is Process Capability?",
a:"A statistical measure of a process's inherent ability to produce output within specification limits under a state of statistical control.",
detail:"Expressed as 6σ (where σ = within-subgroup standard deviation). A capable process has most of its spread within the specification limits — the bell curve fits within USL and LSL."},

{phase:"Measure",cat:"Process Capability",
q:"What is Cp?",
a:"Short-term capability index measuring the ratio of specification width to process spread, assuming the process is perfectly centered.",
formula:"Cp = (USL − LSL) / 6σ",
detail:"Cp ≥ 1.33 is generally acceptable. Cp = 2.0 is a Six Sigma process. Cp ignores where the process is centered — use Cpk to account for centering."},

{phase:"Measure",cat:"Process Capability",
q:"What is Cpk?",
a:"Short-term capability index that accounts for both process spread AND the distance of the mean from the nearest specification limit.",
formula:"Cpk = min[(USL − μ)/3σ, (μ − LSL)/3σ]",
detail:"Cpk ≤ Cp always. If Cp = Cpk, the process is perfectly centered. Cpk < 1.0 means the process is producing defects. Target: Cpk ≥ 1.33 (minimum), ≥ 2.0 for Six Sigma."},

{phase:"Measure",cat:"Process Capability",
q:"What is the difference between Cp/Cpk and Pp/Ppk?",
a:"Cp/Cpk use within-subgroup σ (short-term, potential capability). Pp/Ppk use overall σ including all sources of variation (long-term, actual performance).",
detail:"Pp/Ppk ≤ Cp/Cpk. The gap between them reveals how much the process shifts/drifts over time. Six Sigma assumes a 1.5σ long-term shift, so short-term Cp=2 → long-term DPMO=3.4."},

{phase:"Measure",cat:"Process Capability",
q:"What is the concept of Stability in process capability?",
a:"A process is stable (in statistical control) when only common cause variation is present — no special causes. Capability should only be calculated for stable processes.",
detail:"Assess stability using a control chart BEFORE calculating Cp/Cpk. Calculating capability on an unstable process produces meaningless results."},

// ── ANALYZE: Variation ────────────────────────────────────
{phase:"Analyze",cat:"Variation",
q:"What are the three families of variation in a Multi-Vari study?",
a:"Positional (within-piece): variation within a single unit. Cyclical (piece-to-piece): variation between consecutive units. Temporal (time-to-time): variation over time.",
detail:"Multi-vari charts help identify which family is dominant, directing where to focus improvement efforts. More efficient than DOE for initial screening. Plot 2-5 samples across 3-5 time periods."},

{phase:"Analyze",cat:"Variation",
q:"What is Common Cause vs. Special Cause variation?",
a:"Common Cause (random/inherent): natural variation in a stable process — expected and predictable. Special Cause (assignable): unusual variation from an identifiable source — requires investigation.",
detail:"A process with only common cause variation is 'in statistical control' but may not be capable. Special causes are identified by control chart signals: points outside limits, runs, trends, hugging."},

{phase:"Analyze",cat:"Inferential Statistics",
q:"What is the Central Limit Theorem (CLT)?",
a:"As sample size increases (n ≥ 30), the distribution of sample means approaches normal regardless of the population's distribution.",
formula:"Mean of x̄ = μ;  Standard Error = σ/√n",
detail:"Foundation for hypothesis testing, control charts, and confidence intervals. Allows use of normal-distribution tools even when the population is non-normal, provided n is large enough."},

{phase:"Analyze",cat:"Inferential Statistics",
q:"What is the difference between Practical Significance and Statistical Significance?",
a:"Statistical significance: the result is unlikely to be due to chance (p < α). Practical significance: the effect is large enough to matter in the real world (business impact).",
detail:"A result can be statistically significant but practically trivial (especially with large n). Always evaluate both. A 0.001-inch improvement may be statistically significant but irrelevant to the customer."},

// ── ANALYZE: Hypothesis Testing ───────────────────────────
{phase:"Analyze",cat:"Hypothesis Testing",
q:"What is a Null Hypothesis (H₀) vs. Alternative Hypothesis (Hₐ)?",
a:"H₀: no effect exists — results are due to chance. Hₐ: an effect exists — what the researcher expects. They are mutually exclusive; if one is true, the other is false.",
detail:"CRITICAL: We NEVER 'accept' H₀ — we only 'fail to reject' it. We always test the null. Rejecting H₀ provides evidence for Hₐ but does not prove it absolutely."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"What are the five steps of the Hypothesis Testing Process?",
a:"1) Identify the question. 2) Determine significance level (α). 3) Choose the test. 4) Interpret results (p-value vs. α). 5) Make a decision (reject or fail to reject H₀).",
detail:"α is typically set at 0.05. The test is chosen based on data type (continuous vs. attribute), number of groups, and normality. The decision is always about H₀."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"What is a Type I Error (α) and Type II Error (β)?",
a:"Type I (α): rejecting a true H₀ — false positive. 'Producer's Risk.' Type II (β): failing to reject a false H₀ — false negative. 'Consumer's Risk.'",
detail:"Power = 1 − β = probability of correctly detecting a real effect. Decreasing α increases β (tradeoff). Increasing sample size reduces both. α is set by the analyst; β depends on effect size and n."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"What is a p-value?",
a:"The probability of observing a test statistic as extreme as (or more extreme than) the one calculated, assuming H₀ is true.",
detail:"If p < α: reject H₀ (result is statistically significant). If p > α: fail to reject H₀. A small p-value means the observed result is unlikely under H₀. p-value is NOT the probability H₀ is true."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"What is the significance level (α) and what does it represent?",
a:"The pre-set threshold for rejecting H₀ — the maximum acceptable probability of making a Type I error.",
detail:"Industry standard: α = 0.05 (5% chance of false positive). Can be set stricter (α = 0.01) for high-stakes decisions. Must be set BEFORE collecting data to avoid p-hacking."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"When do you use a 1-Sample t-test?",
a:"To test whether a sample mean differs from a known or hypothesized population value (e.g., 'Is our mean cycle time = 10 days?').",
detail:"Assumes normality (or n ≥ 30 by CLT). H₀: μ = μ₀. Uses the t-distribution with n−1 degrees of freedom. Appropriate for continuous data with one group."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"When do you use a 2-Sample t-test vs. a Paired t-test?",
a:"2-Sample: comparing means of two independent groups (different subjects). Paired: comparing two related measurements on the same subjects (before/after, matched pairs).",
detail:"Paired t-test is more powerful when data is truly paired because it controls for subject-to-subject variation. Using an independent test on paired data wastes statistical power."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"When do you use One-Way ANOVA?",
a:"To test whether the means of THREE OR MORE independent groups are significantly different (extends the 2-sample t-test to multiple groups).",
detail:"H₀: all group means are equal. Uses F-statistic = MS_between / MS_within. Assumes normality, independence, and equal variances (homogeneity). Post-hoc tests identify which specific groups differ."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"What is the F-statistic in ANOVA?",
a:"The ratio of between-group variance (treatment effect) to within-group variance (random error). A large F means more variation is explained by the treatment than by chance.",
formula:"F = MS_Factor / MS_Error = (SS_Factor/df_Factor) / (SS_Error/df_Error)",
detail:"If F > F_critical (or p < α): reject H₀. The F-test in ANOVA only tells you that AT LEAST ONE mean differs — post-hoc tests (Tukey, Fisher) identify which ones."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"What is the 1-Sample Variance test?",
a:"Tests whether a population variance equals a specified value using the Chi-Square distribution.",
formula:"χ² = (n−1)s² / σ₀²",
detail:"H₀: σ² = σ₀². Used when you need to confirm a process has a specific amount of variation, not just a specific mean. Example: verifying a new machine meets variance specs."},

// ── ANALYZE: Non-Parametric Tests ─────────────────────────
{phase:"Analyze",cat:"Non-Parametric Tests",
q:"When should you use non-parametric hypothesis tests?",
a:"When data is non-normal AND the sample is too small to rely on CLT (n < 30), or when data is ordinal/ranked rather than continuous.",
detail:"Non-parametric tests use ranks instead of actual values — they are less powerful than parametric tests when normality holds. Always prefer parametric if assumptions are met."},

{phase:"Analyze",cat:"Non-Parametric Tests",
q:"What is the Mann-Whitney test? When is it used?",
a:"Non-parametric equivalent of the 2-sample t-test — compares medians of two independent groups using rank-sum comparisons.",
detail:"H₀: the two population medians are equal. Does not require normality. Less powerful than the t-test when normality holds. Assumes similar distribution shapes between groups."},

{phase:"Analyze",cat:"Non-Parametric Tests",
q:"What is the Kruskal-Wallis test? When is it used?",
a:"Non-parametric equivalent of One-Way ANOVA — compares medians of THREE OR MORE independent groups.",
detail:"H₀: all group medians are equal. Extension of Mann-Whitney to multiple groups. If significant, post-hoc pairwise Mann-Whitney tests identify which groups differ."},

{phase:"Analyze",cat:"Non-Parametric Tests",
q:"What is Mood's Median test?",
a:"A non-parametric test comparing medians of two or more groups using a contingency table approach — less powerful than Kruskal-Wallis but more robust to outliers.",
detail:"Creates a 2×k contingency table (above/below median × groups). Uses Chi-Square to test independence. Good when outliers are present."},

{phase:"Analyze",cat:"Non-Parametric Tests",
q:"What is the 1-Sample Sign Test?",
a:"Tests whether a sample median equals a hypothesized value by counting how many observations fall above/below the hypothesized median.",
detail:"The simplest non-parametric test. Uses the binomial distribution. Less powerful than the Wilcoxon Signed Rank test because it ignores the magnitude of differences."},

{phase:"Analyze",cat:"Non-Parametric Tests",
q:"What is the 1-Sample Wilcoxon Signed Rank Test?",
a:"Non-parametric equivalent of the 1-sample t-test — tests whether a sample median equals a hypothesized value using both the sign AND magnitude of differences from the hypothesized value.",
detail:"More powerful than the Sign test because it uses rank information. Assumes symmetry of the distribution around the median. H₀: median = hypothesized value."},

{phase:"Analyze",cat:"Non-Parametric Tests",
q:"What is the Friedman Test?",
a:"Non-parametric equivalent of repeated-measures ANOVA — compares medians across multiple related groups (same subjects measured under different conditions).",
detail:"Used when the same experimental units appear in each group (blocked design). Ranks within each block. H₀: all treatment medians are equal."},

{phase:"Analyze",cat:"Non-Parametric Tests",
q:"What is the Chi-Square test (Contingency Table)?",
a:"Tests independence between two categorical variables — whether the distribution of one variable differs across levels of another.",
detail:"H₀: the two variables are independent. Requires expected cell counts ≥ 5. Used for attribute data (pass/fail, categories). Also used for Goodness-of-Fit tests."},

{phase:"Analyze",cat:"Non-Parametric Tests",
q:"What is a One/Two Sample Proportion test?",
a:"1-sample: tests if a population proportion equals a specified value. 2-sample: tests if two population proportions are equal.",
formula:"z = (p̂ − p₀) / √[p₀(1−p₀)/n]  (1-sample)",
detail:"Used for binary/attribute data. Approximated by normal distribution for large samples (np ≥ 5 and n(1−p) ≥ 5). H₀ for 2-sample: p₁ = p₂."},

// ── IMPROVE: Regression ───────────────────────────────────
{phase:"Improve",cat:"Regression",
q:"What is Simple Linear Regression?",
a:"A method modeling the linear relationship between one independent variable (x) and one dependent variable (y), used to predict y and quantify x's effect.",
formula:"ŷ = b₀ + b₁x   (b₀ = intercept, b₁ = slope)",
detail:"Best-fit line uses least squares method (minimizes sum of squared residuals). Test H₀: b₁ = 0 to determine if a linear relationship exists. Key output: R² (proportion of Y variation explained by X)."},

{phase:"Improve",cat:"Regression",
q:"What is the Correlation Coefficient (r) and Coefficient of Determination (R²)?",
a:"r: measures strength and direction of linear relationship (−1 to +1). R²: proportion of Y's variation explained by X (0% to 100%).",
detail:"r = +1: perfect positive; r = −1: perfect negative; r = 0: no linear relationship. R² = r² for simple regression. R² = 0.80 means X explains 80% of the variation in Y."},

{phase:"Improve",cat:"Regression",
q:"What is Residuals Analysis in regression?",
a:"Examining the differences between actual (y) and predicted (ŷ) values to validate that model assumptions are met.",
detail:"Residuals should be: normally distributed, random (no pattern vs. fitted values), have constant variance (homoscedasticity), and be independent. Patterns in residuals indicate model violations."},

{phase:"Improve",cat:"Regression",
q:"What is Multiple Linear Regression (MLR)?",
a:"Regression with two or more independent variables predicting one dependent variable — extends simple regression to multiple predictors.",
formula:"ŷ = b₀ + b₁x₁ + b₂x₂ + ... + bₖxₖ",
detail:"Use Adjusted R² (not R²) to compare models with different numbers of predictors. Check for multicollinearity (VIF > 5-10 is problematic). Each coefficient represents the effect of that X holding all others constant."},

{phase:"Improve",cat:"Regression",
q:"What is a Box-Cox Transformation?",
a:"A power transformation applied to non-normal continuous data to normalize it so that parametric statistical tests can be validly applied.",
detail:"Finds optimal λ: λ=1 (no transform), λ=0 (natural log), λ=0.5 (square root), λ=−1 (reciprocal). Used when data violates normality assumption. After analysis, results must be back-transformed."},

{phase:"Improve",cat:"Regression",
q:"What are Confidence Intervals vs. Prediction Intervals in regression?",
a:"Confidence Interval: a range likely to contain the true mean response for a given X value. Prediction Interval: a range likely to contain the NEXT individual observation at a given X.",
detail:"Prediction intervals are always WIDER than confidence intervals because they account for individual data point variability in addition to uncertainty in the mean estimate."},

// ── IMPROVE: DOE ──────────────────────────────────────────
{phase:"Improve",cat:"DOE",
q:"What is the objective of Design of Experiments (DOE)?",
a:"To efficiently determine the optimal settings for multiple input variables (x's) simultaneously to achieve desired output performance (Y).",
detail:"More efficient than OFAT (One Factor At A Time) because it can detect interaction effects with fewer total runs. The basic flow: define objectives → select factors/levels → design → run → analyze → conclude."},

{phase:"Improve",cat:"DOE",
q:"What is the difference between OFAT and factorial DOE?",
a:"OFAT varies one factor at a time — misses interaction effects and requires many runs. Factorial DOE varies all factors simultaneously — detects interactions and requires fewer runs for the same information.",
detail:"Interaction: when the effect of one factor depends on the level of another. OFAT can never detect interactions. A 2³ full factorial (3 factors, 2 levels each) = 8 runs vs. OFAT requiring much more."},

{phase:"Improve",cat:"DOE",
q:"What are the four types of DOE factors?",
a:"Experimental (you control and set them), Classification (can't be set but can be recognized for blocking), Treatment (factors of primary interest you manipulate), Nuisance (affect results but aren't of interest — block or randomize).",
detail:"Quantitative factors: set to any numeric level (temperature, pH). Qualitative factors: have categories (material type, supplier). Always randomize run order to prevent bias from time-related effects."},

{phase:"Improve",cat:"DOE",
q:"What is a 2k Full Factorial Design?",
a:"An experiment testing all combinations of k factors each at exactly 2 levels (low and high), requiring 2k total runs — reveals ALL main effects and ALL interaction effects.",
detail:"k=2: 4 runs; k=3: 8 runs; k=4: 16 runs. Balanced (equal observations per level) and orthogonal (factors uncorrelated). Add center points to check for curvature/non-linearity."},

{phase:"Improve",cat:"DOE",
q:"What is a Fractional Factorial Design and why is it used?",
a:"A strategically chosen subset of the full factorial — runs only a fraction (1/2, 1/4, etc.) of all combinations to reduce experimental cost, at the cost of confounding some higher-order effects.",
formula:"Runs = 2^(k−p)  where p = number of generators",
detail:"Used when full factorial is too expensive or time-consuming. Resolution determines which effects are confounded. Always run the highest resolution affordable."},

{phase:"Improve",cat:"DOE",
q:"What is Confounding (Aliasing) in DOE?",
a:"When two or more effects are mathematically indistinguishable — their individual contributions cannot be separated — because they are estimated by the same contrast.",
detail:"Occurs in all fractional factorials. Example in Res III: main effect A is aliased with BC interaction. You observe the combined effect but cannot separate them without additional runs."},

{phase:"Improve",cat:"DOE",
q:"What do DOE Resolution levels (III, IV, V) mean?",
a:"Resolution III: main effects confounded with 2-factor interactions (2FIs). Resolution IV: main effects clear, but 2FIs aliased with other 2FIs. Resolution V: all main effects AND all 2FIs estimable.",
detail:"Higher resolution = more information but more runs. Resolution V is ideal for screening critical factors. Resolution III is acceptable only for initial screening when resources are very limited."},

{phase:"Improve",cat:"DOE",
q:"What are Balanced and Orthogonal designs in DOE?",
a:"Balanced: equal number of observations at each factor level. Orthogonal: factor levels are uncorrelated — each effect can be estimated independently without confounding by other factors.",
detail:"Standard factorial designs are both. Orthogonality is what makes clean, unbiased effect estimation possible. Unbalanced designs (missing runs) compromise orthogonality."},

{phase:"Improve",cat:"DOE",
q:"What are Center Points in a factorial design?",
a:"Additional experimental runs at the midpoint of all factor ranges (coded as 0), added to detect curvature (quadratic/non-linear response) in the model.",
detail:"If center points differ significantly from the predicted linear model mean, the system has curvature and a Response Surface Method (RSM) design may be needed to fully model it."},

{phase:"Improve",cat:"DOE",
q:"What is Non-Linear Regression?",
a:"A regression technique used when the relationship between X and Y follows a curve rather than a straight line — the model contains non-linear parameters.",
detail:"Examples: exponential, power, sigmoid, polynomial models. Unlike linear regression, there is no closed-form solution — iterative numerical methods are used. Assess using residual plots and R²."},

// ── CONTROL: Lean ─────────────────────────────────────────
{phase:"Control",cat:"Lean Controls",
q:"What is Kanban?",
a:"A visual pull system that uses signals (cards, bins, boards) to authorize production or material replenishment — nothing moves without a Kanban signal.",
detail:"Originated at Toyota for JIT (Just-in-Time) manufacturing. Key principle: limit WIP (Work in Progress). Kanban is a scheduling tool, NOT an inventory management tool. Prevents overproduction waste."},

{phase:"Control",cat:"Lean Controls",
q:"What is Poka-Yoke (Mistake Proofing)?",
a:"Error-proofing — designing a process or product so that errors are physically impossible or immediately detected and signaled.",
detail:"Coined by Shigeo Shingo in 1960s Japan ('fool-proofing'). Three strategies: Shut-out (prevent the error), Attention (signal when error occurs), Comprehensive (combine both). Example: asymmetric USB connectors, surgical sponge counts."},

{phase:"Control",cat:"Lean Controls",
q:"What are the three Poka-Yoke detection/prevention methods?",
a:"Contact method (detects physical trait deviations — shape, size, color). Constant number method (detects incorrect count of actions/parts). Sequencing method (checklist ensures correct order of steps).",
detail:"The contact method is most common in manufacturing (limit switches, sensors). The sequencing method is common in services (surgical checklists, pre-flight checklists)."},

{phase:"Control",cat:"Lean Controls",
q:"What is 5S used for in the Control Phase?",
a:"To sustain workplace organization improvements after a project ends — standardizing the physical environment to prevent the re-emergence of waste and non-conformance.",
detail:"5S Control Methods: visual management boards, shadow boards for tools, floor markings, labeled storage. 5S audits are a common Control Phase deliverable."},

// ── CONTROL: SPC ──────────────────────────────────────────
{phase:"Control",cat:"SPC",
q:"What is Statistical Process Control (SPC)?",
a:"A statistical method using control charts to monitor a process over time, distinguishing common cause from special cause variation to maintain control and drive prevention-based quality.",
detail:"Developed by Walter Shewhart at Bell Labs in 1924. Popularized by Deming in Japan post-WWII. Moves quality from detection (inspect after) to prevention (monitor in real-time)."},

{phase:"Control",cat:"SPC",
q:"What are the key anatomy elements of a control chart?",
a:"Center Line (CL = process mean), Upper Control Limit (UCL = CL + 3σ), Lower Control Limit (LCL = CL − 3σ), and data points plotted in time order.",
detail:"CRITICAL: Control limits ≠ Specification limits. Control limits are the VOICE OF THE PROCESS (what it does). Spec limits are the VOICE OF THE CUSTOMER (what they need). Never put spec limits on a control chart."},

{phase:"Control",cat:"SPC",
q:"What signals indicate Special Cause variation on a control chart?",
a:"1) Point beyond UCL or LCL. 2) Run of 7+ consecutive points on one side of center line. 3) Trend of 7+ consecutive increasing or decreasing points. 4) Unusual patterns/cycles.",
detail:"Some standards use 8 consecutive points (Western Electric rules). The run and trend rules detect gradual shifts that a single-point test would miss. Investigate every signal — do not adjust the process for common cause variation."},

{phase:"Control",cat:"SPC",
q:"What is an I-MR Chart and when is it used?",
a:"Individual-Moving Range chart — used for continuous data when subgroup size = 1 (one measurement per time period).",
detail:"I-chart monitors individual values for shifts in the mean. MR-chart monitors variation between consecutive pairs. Commonly used in chemical/process industries where one measurement is taken per batch."},

{phase:"Control",cat:"SPC",
q:"What is an X̄-R Chart and when is it used?",
a:"X-bar and Range chart — monitors the mean (X̄) and range (R) of subgroups for continuous data. Best for subgroup sizes 2–10.",
detail:"X̄-chart detects mean shifts. R-chart detects spread changes. Most common variable control chart in manufacturing. For subgroups > 10, use X̄-S chart (standard deviation is more efficient than range for large n)."},

{phase:"Control",cat:"SPC",
q:"What is an X̄-S Chart and when is it preferred over X̄-R?",
a:"X-bar and Standard Deviation chart — like X̄-R but uses standard deviation instead of range. Preferred when subgroup size n > 10.",
detail:"Standard deviation uses ALL data points within a subgroup (more statistically efficient than range, which only uses max and min). The gain in efficiency becomes meaningful at larger n."},

{phase:"Control",cat:"SPC",
q:"What are the four attribute control charts and when is each used?",
a:"P-chart: proportion defective (variable subgroup size). NP-chart: number defective (constant subgroup size). C-chart: count of defects per unit (constant size). U-chart: defects per unit (variable size).",
detail:"P and NP track defectives (whole units that fail). C and U track defects (individual nonconformances per unit). P/U for variable n; NP/C for constant n. Always need n large enough so expected defects ≥ 5."},

{phase:"Control",cat:"SPC",
q:"What is a CuSum (Cumulative Sum) Chart?",
a:"A control chart that accumulates deviations from a target value over time — highly sensitive to small, sustained shifts in the process mean that Shewhart charts would miss.",
detail:"Uses a V-mask or tabular method to detect shifts. More sensitive to shifts of 1-2σ than standard Shewhart charts. Used when detecting gradual drift is critical (chemical processes, financial monitoring)."},

{phase:"Control",cat:"SPC",
q:"What is an EWMA (Exponentially Weighted Moving Average) Chart?",
a:"A control chart giving exponentially more weight to recent data — sensitive to small, gradual shifts in the mean similar to CuSum.",
formula:"Zₜ = λxₜ + (1−λ)Zₜ₋₁   (λ = smoothing parameter, 0 < λ ≤ 1)",
detail:"Lower λ = more weight on history = more smoothing = better at detecting small shifts. Higher λ → approaches a Shewhart I-chart. Used alongside CuSum for process monitoring with tight tolerances."},

{phase:"Control",cat:"SPC",
q:"What is Rational Subgrouping's impact on control charts?",
a:"Proper subgrouping isolates within-subgroup variation (common cause) from between-subgroup variation (special cause), making control charts sensitive to process changes.",
detail:"Bad subgrouping (mixing different machines, shifts, or operators into one subgroup) inflates within-subgroup variation and makes control limits too wide — real signals are missed."},

// ── CONTROL: Control Plans ─────────────────────────────────
{phase:"Control",cat:"Control Plans",
q:"What is a Control Plan?",
a:"A document specifying what characteristics to measure, how to measure them, acceptable ranges, sampling frequency, charting method, responsible person, and response actions to maintain process improvements.",
detail:"Created in the Control phase. One plan per process. Must be: clearly presented, easy to follow, comprehensive (no assumed knowledge), repeatable and reproducible. Fights entropy — keeps improvements from eroding back to old state."},

{phase:"Control",cat:"Control Plans",
q:"What is a Response Plan?",
a:"The section of the control plan that specifies corrective actions to take when the process signals out-of-control — the 'what do we do when something goes wrong' guide.",
detail:"Should specify: who is responsible, what action to take, how quickly, how to document, and when to escalate. Without a response plan, a control chart is just decoration."},

{phase:"Control",cat:"Control Plans",
q:"What are the 7 elements of a Process Control Plan?",
a:"1) Specifications/measurement guide. 2) Inputs and outputs. 3) Performance criteria. 4) Sampling and reporting frequency. 5) Recording method/charts. 6) Contingency/response actions. 7) Process owner.",
detail:"A Product Control Plan additionally lists: item name, important characteristics, measurement tools, tolerance ranges, testing frequency, charting method, and responsible person."},

{phase:"Control",cat:"Control Plans",
q:"What financial analyses are done in the Control phase?",
a:"Cost-Benefit Analysis (verify benefits exceed costs), ROI calculation (backward-looking), and ongoing COPQ tracking to confirm quality cost improvements are sustained.",
detail:"The Control phase must validate that the financial benefits claimed in the Define phase were actually achieved and are being sustained over time."},

// ── EXTRA HIGH-FREQUENCY EXAM TOPICS ─────────────────────
{phase:"Define",cat:"Lean History",
q:"What are the key contributors to the History of Lean?",
a:"Sakichi Toyoda (automated loom / Jidoka concept), Kiichiro Toyoda (JIT concept), Taiichi Ohno (TPS architect), Frederick Taylor (scientific management), Henry Ford (mass production flow).",
detail:"TPS = Toyota Production System — the foundation of modern Lean. Taiichi Ohno is considered the primary architect. W. Edwards Deming brought statistical quality to Japan post-WWII."},

{phase:"Define",cat:"Six Sigma History",
q:"What is the history of Six Sigma's key contributors?",
a:"Walter Shewhart (control charts, PDCA, 1920s). W.E. Deming (14 Points, PDSA, spread SPC in Japan). Joseph Juran (Quality Trilogy, Pareto). Kaoru Ishikawa (fishbone diagram, QC circles). Bill Smith/Motorola (Six Sigma, 1986).",
detail:"Deming's 14 Points for management and his work in Japan (1950s) transformed Japanese manufacturing. Juran's Quality Trilogy: Planning, Control, Improvement — still foundational."},

{phase:"Measure",cat:"Graphical Analysis",
q:"What is a Scatter Plot used for in Six Sigma?",
a:"To visualize the relationship between two continuous variables (X and Y) — reveals correlation direction, strength, and whether a linear model is appropriate.",
detail:"Positive correlation: both increase together. Negative correlation: as X increases Y decreases. No pattern: no linear relationship. Non-linear pattern: suggests non-linear regression. Always plot before running regression."},

{phase:"Measure",cat:"Graphical Analysis",
q:"What is a Histogram used for?",
a:"To display the frequency distribution of continuous data — reveals shape (normal, skewed, bimodal), center, spread, and outliers.",
detail:"Number of bins affects the picture. Too few: hides details. Too many: noise dominates. Bimodal histogram suggests two distinct populations (e.g., two machines, two shifts) — investigate with stratification."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"Which hypothesis test do you use for each scenario? (Key selection guide)",
a:"1 group vs. target mean → 1-sample t. 2 independent group means → 2-sample t. 2 related group means → Paired t. 3+ group means → One-Way ANOVA. 1 variance → Chi-Square. 2 variances → F-test. Proportions → Z-proportion test.",
detail:"For non-normal data: 1-sample t → Sign or Wilcoxon. 2-sample t → Mann-Whitney. ANOVA → Kruskal-Wallis or Mood's Median. Paired t → Friedman. 2 proportions → Chi-Square (contingency)."},

{phase:"Improve",cat:"DOE",
q:"What is the DOE term for factors you want to manipulate vs. factors you control for?",
a:"Treatment factors: manipulated to test their effect. Nuisance factors: not of primary interest but could affect results — handled by blocking (if known) or randomization (if unknown).",
detail:"Blocking isolates a known nuisance factor's effect. Randomization protects against unknown nuisance factors by spreading their effects equally across treatment combinations."},

{phase:"Control",cat:"SPC",
q:"What is a Run Chart and how does it differ from a Control Chart?",
a:"A Run Chart plots data in time order around a median line — shows trends and shifts but has NO control limits, so it cannot signal out-of-control conditions.",
detail:"A control chart = run chart + UCL + LCL at ±3σ. Run charts are useful early in a project when control limits haven't been established. They can detect trends and runs but not point-beyond-limits violations."},

{phase:"Define",cat:"Process Tools",
q:"What is the purpose of a Sub-Process Map?",
a:"A more detailed map that expands one step of a higher-level process map (like a SIPOC) to show the sub-steps, decisions, and handoffs within that step.",
