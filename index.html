detail:"Used when one step of a process is too complex to fully understand from the high-level view. Helps identify micro-level waste, rework loops, and bottlenecks within a specific process segment."},

{phase:"Measure",cat:"MSA",
q:"What is Linearity in a measurement system?",
a:"How the bias of a measurement system changes across the operating range — whether the gage is equally accurate at low, mid, and high measurement values.",
detail:"Ideally, bias is zero across the entire range. If bias increases at higher values, the gage is non-linear and may need recalibration or replacement. Assessed as part of a full MSA."},

{phase:"Measure",cat:"MSA",
q:"What is Stability in a measurement system?",
a:"How the bias (and sometimes precision) of a measurement system changes over time — whether the gage remains consistent day-to-day and week-to-week.",
detail:"Assessed by repeatedly measuring a standard reference part over an extended period. Drift suggests calibration issues or gage wear. Important for long-running studies."},

{phase:"Analyze",cat:"Inferential Statistics",
q:"What is the difference between Sampling With vs. Without Replacement?",
a:"With replacement: a selected item is returned to the population before the next draw — same item can be selected again (Binomial distribution applies). Without replacement: item is not returned (Hypergeometric distribution applies).",
detail:"For large populations, sampling without replacement approximates sampling with replacement. The distinction matters most for small populations where a large fraction is sampled."},

{phase:"Improve",cat:"Regression",
q:"What is Multicollinearity in Multiple Linear Regression?",
a:"When two or more independent variables (predictors) are highly correlated with each other, making it difficult to isolate each variable's individual effect on Y.",
detail:"Detected using VIF (Variance Inflation Factor). VIF > 5-10 indicates problematic multicollinearity. Solutions: remove one of the correlated variables, use PCA, or use ridge regression."},

{phase:"Control",cat:"SPC",
q:"What is a Subgroup in SPC and why does its size matter?",
a:"A subgroup is a small set of consecutive units collected at one time to estimate short-term common-cause variation. Size determines control chart sensitivity and calculation method.",
detail:"n=1: I-MR. n=2-10: X̄-R. n>10: X̄-S. Larger subgroups detect smaller shifts in the mean (more power) but are more expensive. Frequency (how often) affects ability to detect temporal special causes."},

{phase:"Define",cat:"Lean",
q:"What is Kaizen?",
a:"A Japanese philosophy and practice of continuous improvement — making small, incremental changes constantly rather than large, infrequent overhauls.",
detail:"A Kaizen Event (Kaizen Blitz) is an intensive 3-5 day workshop where a cross-functional team rapidly implements improvements to a specific process. Kaizen is the spirit; DMAIC is the method."},

{phase:"Define",cat:"Lean",
q:"What are Lean Metrics: PCE, Little's Law, WIP?",
a:"PCE (Process Cycle Efficiency) = Value-Added Time / Total Lead Time. Little's Law: WIP = Throughput × Lead Time. WIP = Work In Progress (units actively in the process).",
detail:"PCE < 25% suggests significant improvement opportunity. Little's Law is powerful: to reduce lead time, reduce WIP or increase throughput. Reducing WIP is often the faster lever."},

{phase:"Analyze",cat:"Variation",
q:"What is the concept of Stability in the Analyze Phase?",
a:"A process is stable when it exhibits only common cause variation — its statistical behavior is predictable over time. Unstable processes have special causes that must be identified and eliminated first.",
detail:"Assess stability with a control chart or run chart before calculating capability indices. You cannot meaningfully predict future performance from an unstable process."},

{phase:"Measure",cat:"Process Capability",
q:"What is the Z-score and how does it relate to process capability?",
a:"Z = (specification limit − process mean) / σ. It measures how many standard deviations a spec limit is from the process mean. Z_min = Cpk × 3.",
formula:"Z = (USL − μ)/σ  or  Z = (μ − LSL)/σ",
detail:"A 6σ process has Z_min = 6 (short-term). After 1.5σ shift: effective Z = 4.5, corresponding to 3.4 DPMO. Z-tables translate Z-scores to probability of defects."},

{phase:"Define",cat:"Six Sigma Basics",
q:"What are Bloom's Taxonomy Levels as used in the IASSC BOK?",
a:"Remember → Understand → Apply → Analyze → Evaluate → Create. Listed from least to most complex cognitive level.",
detail:"The IASSC BB exam tests across all levels. 'Remember' = recall definitions. 'Apply' = use tools correctly. 'Analyze' = diagnose a situation. 'Evaluate' = judge which approach is best. 'Create' = synthesize a solution."},

{phase:"Control",cat:"Control Plans",
q:"What makes a Control Plan effective and sustainable?",
a:"It must be: clearly written (easy to skim for experts), easy to follow for new users, comprehensive (no assumed knowledge), and reproducible (two people following it get the same result).",
detail:"The control plan fights entropy — the natural tendency for improvements to erode back to old habits. Without a living control plan, DMAIC gains typically disappear within 12-18 months."},


// ── GAP FILL: History (low volume, high yield) ────────────
{phase:"Define",cat:"History",
q:"What is each quality pioneer best known for? Shewhart / Deming / Juran / Ishikawa / Taguchi",
a:"Shewhart: control charts, PDCA, common vs. special cause. Deming: 14 Points, PDSA, chain reaction of quality. Juran: Quality Trilogy (Plan/Control/Improve), Pareto. Ishikawa: fishbone diagram, CWQC. Taguchi: robust design, loss function.",
detail:"IASSC asks 2-3 easy history questions. Remember: Shewhart = father of SQC. Deming = brought SPC to Japan. Juran = 'vital few' / Pareto. Ishikawa = fishbone + quality circles. Taguchi = parameter design to reduce sensitivity to variation."},

{phase:"Define",cat:"History",
q:"What is Deming's Chain Reaction of Quality?",
a:"Improve Quality → Costs Decrease → Productivity Improves → Capture Market with Better Quality/Price → Stay in Business → Provide Jobs.",
detail:"Deming argued quality improvement and cost reduction are NOT in conflict — they reinforce each other. This was revolutionary and forms the business case for Six Sigma."},

{phase:"Define",cat:"History",
q:"What is Juran's Quality Trilogy?",
a:"Quality Planning (design to meet customer needs), Quality Control (monitor and correct to plan), Quality Improvement (breakthrough projects to reach new levels).",
detail:"Juran also popularized applying the Pareto principle to quality — 80% of quality problems come from 20% of causes. He coined the term 'vital few vs. trivial many.'"},

{phase:"Define",cat:"History",
q:"What is the PDCA / PDSA cycle and who created it?",
a:"Plan-Do-Check/Study-Act — a four-step iterative improvement cycle created by Walter Shewhart and popularized by Deming (who renamed Check to Study).",
detail:"PDCA = Plan-Do-Check-Act (Shewhart's original). PDSA = Plan-Do-Study-Act (Deming's preferred version). This is the foundation of DMAIC and all continuous improvement cycles."},

// ── GAP FILL: Project Selection ───────────────────────────
{phase:"Define",cat:"Project Selection",
q:"What makes a good Six Sigma project candidate?",
a:"Has a measurable gap between current and desired performance, data is (or can be) available, root cause is unknown, problem directly impacts KPIs or customer CTQs, and management supports the effort.",
detail:"Poor DMAIC candidates: the solution is already known (just implement it), no data is available or measurable, the problem is a one-time event, or leadership won't support changes."},

{phase:"Define",cat:"Project Selection",
q:"What is a Baseline Sigma and why is it established in the Define/Measure phase?",
a:"The current process sigma level (calculated from current DPMO) — establishes the starting point to measure improvement against at project close.",
detail:"Without a baseline, you cannot prove improvement. Baseline sigma is calculated from defect data collected before any changes. It becomes the 'before' in the before/after comparison."},

{phase:"Define",cat:"Project Selection",
q:"What are Leading vs. Lagging indicators in Six Sigma project metrics?",
a:"Lagging indicators: measure outcomes after the fact (DPMO, customer complaints, cost). Leading indicators: predict future performance, allowing early intervention (process cycle time, WIP levels, in-process defect rates).",
detail:"Good control plans include both. Lagging indicators confirm results; leading indicators allow proactive response before the customer is impacted."},

// ── GAP FILL: Z-score & Capability ────────────────────────
{phase:"Measure",cat:"Process Capability",
q:"How does Z-score relate to process capability and DPMO?",
a:"Z_min = Cpk × 3. A Z-score of 6 (short-term) equals 3.4 DPMO after accounting for the 1.5σ long-term shift (effective Z = 4.5). Higher Z = fewer defects.",
formula:"Z = (Spec Limit − μ) / σ    Z_min = min(Z_USL, Z_LSL)",
detail:"Z-table lookup: Z=3 → 0.13% defect rate (1,350 DPMO one-sided). Z=4.5 → 3.4 DPMO. The 1.5σ shift is a convention built into all standard Six Sigma sigma-level tables."},

{phase:"Measure",cat:"Process Capability",
q:"What sigma level corresponds to what DPMO? (Key reference values)",
a:"1σ = 690,000 DPMO. 2σ = 308,000. 3σ = 66,807. 4σ = 6,210. 5σ = 233. 6σ = 3.4 DPMO.",
detail:"These are LONG-TERM values (include 1.5σ shift). Short-term (no shift): 3σ = 2,700 DPMO; 6σ = 0.002 DPMO. The exam uses long-term values unless specified otherwise."},

{phase:"Measure",cat:"Process Capability",
q:"What does it mean when Cpk = Ppk?",
a:"The process is likely in statistical control — within-subgroup variation (σ_within) and overall variation (σ_overall) are approximately equal, meaning no special causes are adding long-term drift.",
detail:"If Cpk >> Ppk, the process is NOT stable — significant between-subgroup variation exists (shifts, drifts, special causes). Use F-test to statistically confirm whether variances are equal."},

{phase:"Measure",cat:"Process Capability",
q:"How do you calculate Attribute (Discrete) Process Capability?",
a:"Convert the proportion defective (p) to a Z-score using the standard normal table, then derive the sigma level. Sigma = Z + 1.5 (adding the long-term shift).",
formula:"Z = NORM.S.INV(1 − p)    Sigma Level = Z + 1.5",
detail:"Example: 5% defective → p=0.05 → Z = NORM.S.INV(0.95) = 1.645 → Sigma level ≈ 3.14. Used when only pass/fail data is available, not continuous measurements."},

{phase:"Measure",cat:"Process Capability",
q:"What is the relationship between Cpk and the Z-score at the nearest spec limit?",
a:"Z_min (at the nearer spec limit) = Cpk × 3. So Cpk = 1.33 means Z_min = 4; Cpk = 2.0 means Z_min = 6.",
formula:"Cpk = Z_min / 3",
detail:"This is the key bridge between capability indices and sigma levels. Memorize it — the exam frequently asks you to convert between Cpk and sigma level or DPMO."},

// ── GAP FILL: MSA Attribute ────────────────────────────────
{phase:"Measure",cat:"MSA",
q:"What is Attribute MSA and what is the Kappa statistic?",
a:"Attribute MSA assesses agreement for pass/fail or categorical measurement systems. Cohen's Kappa measures agreement between raters beyond what would be expected by chance.",
formula:"κ = (Observed Agreement − Expected Agreement) / (1 − Expected Agreement)",
detail:"κ > 0.90: excellent. 0.70-0.90: acceptable. < 0.70: unacceptable — measurement system needs improvement. Used when data is attribute (not continuous). Also called an Attribute Agreement Analysis."},

{phase:"Measure",cat:"MSA",
q:"What is a %P/T ratio in Gage R&R and what does it mean?",
a:"Precision-to-Tolerance ratio: the gage variation as a percentage of the specification tolerance. Shows whether the gage is precise enough relative to the spec width.",
formula:"%P/T = (5.15 × σ_gage) / (USL − LSL) × 100",
detail:"< 10%: excellent. 10-30%: acceptable depending on application. > 30%: unacceptable. Compare to %Study Variation (gage vs. process variation). Both should be reported in a full GR&R study."},

{phase:"Measure",cat:"MSA",
q:"What is the Total Observed Variation equation in MSA?",
a:"Total Observed Variation = Actual Process Variation + Measurement System Variation. The goal of MSA is to ensure measurement variation is small relative to process variation.",
formula:"σ²_Total = σ²_Process + σ²_Measurement",
detail:"If measurement variation is large, you cannot reliably see process variation — control charts and capability studies will be misleading. Always validate the measurement system before drawing conclusions about the process."},

// ── GAP FILL: Hypothesis Testing deeper ───────────────────
{phase:"Analyze",cat:"Hypothesis Testing",
q:"What are one-tailed vs. two-tailed hypothesis tests?",
a:"Two-tailed: tests for any difference (H₁: μ ≠ μ₀) — rejection region split in both tails. One-tailed (left): tests for decrease (H₁: μ < μ₀). One-tailed (right): tests for increase (H₁: μ > μ₀).",
detail:"One-tailed tests are more powerful for detecting a specific direction but miss changes in the opposite direction. Most Six Sigma tests are two-tailed unless a directional change is specifically hypothesized."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"What is the Critical Region / Rejection Region in a hypothesis test?",
a:"The set of all test statistic values that would cause rejection of H₀ — determined by the significance level (α) and the type of test (one or two-tailed).",
detail:"Critical value separates the rejection region from the non-rejection region. If the test statistic falls in the critical region (or p < α), reject H₀. These are set BEFORE collecting data."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"What is Statistical Power (1 − β) and what factors increase it?",
a:"Power = the probability of correctly rejecting a false H₀ (detecting a real effect when it exists). Increased by: larger sample size, larger effect size, higher α, lower variability.",
detail:"Typical target power: 0.80 (80%). Power analysis determines the sample size needed BEFORE running a study. Low power = high risk of missing real improvements (Type II error)."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"What is a Confidence Level and how does it relate to α?",
a:"Confidence Level = 1 − α. A 95% confidence level corresponds to α = 0.05. It represents how confident you are that the confidence interval contains the true population parameter.",
detail:"A 95% CI means: if you repeated the study 100 times, approximately 95 of the resulting CIs would contain the true population mean. It does NOT mean there is a 95% chance the true mean is in THIS interval."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"IASSC-specific: Pooled vs. Unpooled proportion tests — which does IASSC prefer?",
a:"IASSC generally favors UNPOOLED calculations for two-proportion tests (each proportion estimated separately). ASQ and Villanova favor POOLED (proportions averaged).",
detail:"This is a known IASSC exam nuance. When in doubt on IASSC exam proportion problems, use the unpooled standard error formula where each sample proportion is used separately."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"What is the F-test for equal variances and when is it used?",
a:"Tests whether two population variances are equal (H₀: σ₁² = σ₂²). Used as a precondition check before running a 2-sample t-test, and to confirm whether Cpk ≈ Ppk (process stability).",
formula:"F = s₁² / s₂²  (larger variance in numerator)",
detail:"If F is significant (p < α), variances differ — use Welch's t-test (unequal variances version) instead of the standard 2-sample t-test. Also used in ANOVA to check homogeneity of variance assumption."},

// ── GAP FILL: Control Charts deeper ───────────────────────
{phase:"Control",cat:"SPC",
q:"What are the Western Electric (Nelson) Rules for special cause signals?",
a:"Rule 1: 1 point beyond ±3σ. Rule 2: 9 consecutive points on one side of center. Rule 3: 6 consecutive points trending up or down. Rule 4: 14 points alternating up/down. Rule 5: 2 of 3 points beyond ±2σ. Rule 6: 4 of 5 points beyond ±1σ.",
detail:"Rules 1-4 are most commonly tested on the IASSC exam. Rule 1 (point outside limits) is the most obvious. Rules 2-4 detect shifts and trends that haven't broken the 3σ boundary yet. More rules = more sensitivity but also more false alarms."},

{phase:"Control",cat:"SPC",
q:"What is the difference between Control Limits and Specification Limits?",
a:"Control Limits: voice of the PROCESS — calculated from actual process data at ±3σ, show what the process naturally does. Specification Limits: voice of the CUSTOMER — defined by design requirements, show what the process must do.",
detail:"NEVER put spec limits on a control chart — it confuses the two concepts. A process can be in control (within control limits) but not capable (outside spec limits). These are independent assessments."},

{phase:"Control",cat:"SPC",
q:"Which control chart to use: variable vs. attribute data decision tree?",
a:"Continuous data → I-MR (n=1), X̄-R (n=2-10), X̄-S (n>10). Attribute defectives → P-chart (variable n) or NP-chart (constant n). Attribute defects → U-chart (variable n) or C-chart (constant n).",
detail:"Key distinction: defectives = whole units that fail (P, NP). Defects = individual nonconformances per unit (C, U). The n=variable vs. constant distinction further narrows chart selection."},

{phase:"Control",cat:"SPC",
q:"When should you use CuSum or EWMA instead of a standard Shewhart chart?",
a:"When you need to detect small, sustained shifts in the process mean (1-2σ shifts). Shewhart charts require ~3σ shifts before a point falls outside limits; CuSum/EWMA accumulate evidence over time.",
detail:"Use case: tight pharmaceutical or chemical processes where a 1σ drift in potency is critical but would take many Shewhart chart data points to detect. CuSum is better for abrupt small shifts; EWMA is better for gradual drift."},

{phase:"Control",cat:"SPC",
q:"How are the X̄-R chart control limits calculated?",
a:"UCL_X̄ = X̄̄ + A₂R̄;  LCL_X̄ = X̄̄ − A₂R̄;  UCL_R = D₄R̄;  LCL_R = D₃R̄. The constants A₂, D₃, D₄ depend on subgroup size n.",
detail:"These constants are provided in reference tables on the exam. For n=5: A₂=0.577, D₃=0 (no LCL for R), D₄=2.114. Control limits are derived from the RANGE, not from direct σ calculation."},

// ── GAP FILL: DOE deeper ──────────────────────────────────
{phase:"Improve",cat:"DOE",
q:"How do you calculate the number of runs in a Full Factorial design with mixed levels?",
a:"Multiply the number of levels for each factor together.",
formula:"Runs = L₁ × L₂ × L₃ × ... × Lₖ",
detail:"Example: 3 factors with 2, 3, and 4 levels → 2×3×4 = 24 runs. For equal levels: 2k for k factors at 2 levels each. 3k for k factors at 3 levels each. Don't confuse with fractional factorials."},

{phase:"Improve",cat:"DOE",
q:"What is the standard notation for a Fractional Factorial design?",
a:"l^(k−p) where l = number of levels per factor, k = number of factors, p = number of confounded (aliased) interactions. The fraction of a full factorial run is 1/l^p.",
formula:"2^(k−p): e.g. 2^(4−1) = half-fraction of a 4-factor, 2-level design = 8 runs",
detail:"A 2^(4-1) design runs 8 of the 16 possible full factorial runs. A 2^(5-2) design runs 8 of 32. p tells you how many 'generators' were used to create the alias structure."},

{phase:"Improve",cat:"DOE",
q:"What are main effects vs. interaction effects in DOE?",
a:"Main effect: the average change in the response due to changing one factor from low to high (all other factors held constant). Interaction: when the effect of one factor DEPENDS on the level of another factor.",
detail:"Interactions are why OFAT fails — it can never detect them. A significant interaction means you cannot interpret main effects in isolation. Always plot interaction plots to understand them visually."},

{phase:"Improve",cat:"DOE",
q:"What is a Linear vs. Quadratic model in DOE?",
a:"Linear (first-order) model: Y = b₀ + b₁X₁ + b₂X₂ + b₁₂X₁X₂ — assumes a flat (planar) response surface. Quadratic (second-order) model adds squared terms (X²) to capture curvature.",
detail:"Standard 2-level factorials only estimate linear effects and interactions. Center points detect IF curvature exists but can't model it. A Response Surface Design (RSM like CCD or Box-Behnken) is needed to fully model a curved response."},

{phase:"Improve",cat:"DOE",
q:"What is Randomization in DOE and why is it critical?",
a:"Running experimental trials in random order to prevent systematic bias from unknown time-related variables (temperature drift, tool wear, operator fatigue) from corrupting the results.",
detail:"Without randomization, a trend over time could be confounded with a factor effect. Randomization distributes the influence of lurking variables equally across all conditions. Always randomize run order unless physically impossible."},

{phase:"Improve",cat:"DOE",
q:"What is Replication in DOE vs. Repetition?",
a:"Replication: completely restarting an experimental run from scratch — true independent observations that capture run-to-run variation. Repetition: multiple measurements on the same run — captures only measurement variation.",
detail:"Replication is far more powerful for estimating experimental error. Repeated measurements from a single setup are NOT replicates — they don't add degrees of freedom for the error term in ANOVA."},

{phase:"Improve",cat:"DOE",
q:"What is Blocking in DOE?",
a:"Grouping experimental runs by a known nuisance factor (day, batch, operator) and analyzing within those groups to remove the nuisance factor's effect from the error term.",
detail:"Blocking increases precision by removing a known source of variation from the error. Example: if you must run an experiment across two days, make 'day' a blocking factor. Contrast with randomization, which handles UNKNOWN nuisance factors."},

// ── GAP FILL: Regression deeper ───────────────────────────
{phase:"Improve",cat:"Regression",
q:"What is Adjusted R² and when should you use it instead of R²?",
a:"Adjusted R² penalizes for adding predictors that don't improve the model. Use it when comparing multiple regression models with different numbers of predictors — R² always increases when you add variables, even useless ones.",
formula:"Adj R² = 1 − [(1−R²)(n−1)/(n−k−1)]  where k = number of predictors",
detail:"R² can only increase as you add variables. Adjusted R² can decrease if a new variable adds less than expected. Always use Adjusted R² to compare models with different numbers of predictors."},

{phase:"Improve",cat:"Regression",
q:"What is a Prediction Interval vs. Confidence Interval in regression output?",
a:"CI for the mean: range likely containing the TRUE MEAN response at a given X. PI for new observation: range likely containing the NEXT INDIVIDUAL observation at a given X. PIs are always wider.",
detail:"At a given X, PI is wider than CI because it includes both uncertainty in the mean estimate AND natural scatter of individual data points. As n → ∞, CI shrinks to zero but PI does not."},

// ── GAP FILL: Inferential / Sampling ──────────────────────
{phase:"Analyze",cat:"Inferential Statistics",
q:"What is the Standard Error of the Mean and why does it matter?",
a:"Standard Error (SE) = σ/√n — the standard deviation of the sampling distribution of the mean. It quantifies how much sample means vary from sample to sample.",
formula:"SE = σ / √n  (or s / √n when σ is unknown)",
detail:"As n increases, SE decreases — larger samples give more precise estimates of the population mean. SE is the denominator in t-test and z-test statistics. Smaller SE = narrower confidence intervals."},

{phase:"Analyze",cat:"Inferential Statistics",
q:"What is the difference between a Parameter and a Statistic?",
a:"Parameter: a numerical characteristic of a POPULATION (μ, σ, p) — usually unknown. Statistic: a numerical characteristic calculated from a SAMPLE (x̄, s, p̂) — used to estimate the parameter.",
detail:"Inferential statistics = using sample statistics to make decisions about population parameters. This is the entire foundation of hypothesis testing and confidence intervals in Six Sigma."},

// ── GAP FILL: Control Phase deeper ────────────────────────
{phase:"Control",cat:"Control Plans",
q:"What are the five key elements that must appear in every Response Plan?",
a:"1) Who is responsible. 2) What action to take. 3) How quickly to respond. 4) How to document the event. 5) When to escalate to the next level.",
detail:"A response plan without clear ownership and escalation paths is useless in practice. The Response Plan is triggered whenever a control chart signals out-of-control or a KPI falls outside an action limit."},

{phase:"Control",cat:"Lean Controls",
q:"What is the difference between a Pull system and a Push system in Lean?",
a:"Pull: downstream demand triggers upstream production — make only what is needed, when it is needed (Kanban, JIT). Push: upstream schedules drive production regardless of downstream need — leads to overproduction and WIP buildup.",
detail:"Six Sigma and Lean prefer pull systems because they reduce inventory waste and expose process problems. Push systems hide problems behind inventory buffers. Kanban is the primary pull-system implementation tool."},

{phase:"Control",cat:"Lean Controls",
q:"What is Visual Factory (Visual Management) in the Control phase?",
a:"Using visual cues (color coding, shadow boards, andon lights, floor markings, posted metrics) to make process status, standards, and abnormalities immediately obvious to anyone.",
detail:"Part of sustaining 5S and control plan implementation. Visual management enables self-monitoring by operators without requiring supervisors to check. Examples: red/green lights on machines, kanban card slots, posted SPC charts."},

// ── GAP FILL: MSA Variable details ────────────────────────
{phase:"Measure",cat:"MSA",
q:"What are the five components of a complete Variable MSA study?",
a:"Bias, Linearity, Stability, Repeatability, and Reproducibility. Gage R&R covers repeatability and reproducibility; a full MSA covers all five.",
detail:"Bias: systematic offset. Linearity: how bias varies across the range. Stability: how bias varies over time. Repeatability: equipment variation. Reproducibility: operator variation. The IASSC exam tests all five definitions."},

// ── GAP FILL: Capability monitoring ───────────────────────
{phase:"Measure",cat:"Process Capability",
q:"What Monitoring Techniques are used to sustain process capability?",
a:"Control charts (ongoing SPC), periodic capability studies (recalculate Cp/Cpk), process audits, dashboard KPIs, and automated process monitoring/alarms.",
detail:"Once a process is improved, capability must be monitored continuously — not just measured once. Capability can degrade due to tool wear, raw material changes, operator changes, or process drift. Schedule recalculation of Cpk at defined intervals."},

// ── GAP FILL: Variation / Distribution ────────────────────
{phase:"Analyze",cat:"Variation",
q:"What is a Bimodal distribution and what does it indicate?",
a:"A distribution with two distinct peaks — typically indicates two different subpopulations mixed together (two machines, two shifts, two material lots).",
detail:"Bimodal data in a histogram is a warning: stratify the data before analysis. Calculating one mean and σ for a bimodal population is misleading. A Multi-Vari study would reveal the source."},

{phase:"Analyze",cat:"Variation",
q:"What are Skewness and Kurtosis?",
a:"Skewness: asymmetry of a distribution (positive skew = right tail; negative skew = left tail). Kurtosis: peakedness (leptokurtic = heavy tails/peaked; platykurtic = light tails/flat).",
detail:"Normal distribution: skewness = 0, kurtosis = 3 (or excess kurtosis = 0). Highly skewed or heavy-tailed data may require transformation (Box-Cox) before applying parametric tests."},

{phase:"Analyze",cat:"Variation",
q:"What is the Lognormal distribution and when is it used in Six Sigma?",
a:"A continuous distribution where the natural log of the variable is normally distributed — results from multiplicative processes. Common for: time-to-failure, income data, chemical concentrations, cycle times.",
detail:"To analyze lognormal data with parametric tools, take the natural log of all values first. After analysis, back-transform results using the exponential function. Box-Cox transformation often finds λ ≈ 0 (log transform) for this data."},

// ── GAP FILL: FMEA / Risk ──────────────────────────────────
{phase:"Measure",cat:"FMEA",
q:"How do you prioritize actions after calculating RPNs in FMEA?",
a:"Address the highest RPN items first. Also independently flag any Severity = 9 or 10 items regardless of RPN — catastrophic failure modes must be addressed even if occurrence or detection is low.",
detail:"A common mistake: ignoring a low-RPN item with Severity=10. Even if it's unlikely and detectable, a severity-10 failure (injury, regulatory violation) demands mitigation. RPN is the primary ranking tool but not the only one."},

{phase:"Measure",cat:"FMEA",
q:"What actions reduce each FMEA component (S, O, D)?",
a:"Severity: redesign the product or process to reduce impact (usually the hardest). Occurrence: add controls to prevent the cause (process controls, foolproofing). Detection: add or improve testing/inspection to catch failures earlier.",
detail:"You cannot reduce Severity without a design change. Poka-Yoke primarily reduces Occurrence or Detection. SPC and inspection improve Detection. The goal is to reduce RPN — but prioritize actions that reduce Severity first."},

// ── GAP FILL: Graphical tools ─────────────────────────────
{phase:"Measure",cat:"Graphical Analysis",
q:"What is a Box Plot (Box-and-Whisker Plot) and what does each element represent?",
a:"Box: IQR (25th to 75th percentile). Line in box: median. Whiskers: extend to min/max within 1.5×IQR. Points beyond whiskers: outliers.",
detail:"Box plots efficiently show center, spread, skewness, and outliers simultaneously. Use to compare multiple groups side-by-side. More informative than a simple mean ± std dev summary for non-normal data."},

{phase:"Measure",cat:"Graphical Analysis",
q:"What is a Normal Probability Plot (NPP) and how do you interpret it?",
a:"A graphical test for normality — plots data against expected normal quantiles. If data is normal, points fall approximately on a straight diagonal line. Systematic S-curve or deviation = non-normal.",
detail:"Used before applying parametric statistical tests. More sensitive than visual inspection of a histogram. A formal normality test (Anderson-Darling, Shapiro-Wilk) provides a p-value; p > 0.05 supports normality."},

{phase:"Measure",cat:"Graphical Analysis",
q:"What is a Run Chart and what patterns indicate non-randomness?",
a:"A time-ordered plot of data around the median line. Patterns indicating non-randomness: runs (too many consecutive points on one side), trends (sustained increase or decrease), oscillation (systematic alternating), clustering.",
detail:"A run chart with 8+ consecutive points on one side of the median suggests a shift. Approximately 50% of points should be above and below the median for a truly random process. Use before a control chart when baseline is not yet established."},

// ── GAP FILL: Confidence Intervals dedicated ──────────────
{phase:"Analyze",cat:"Inferential Statistics",
q:"What is a Confidence Interval (CI) and how is it constructed?",
a:"A range of values computed from sample data that, with a specified confidence level (e.g., 95%), is likely to contain the true population parameter.",
formula:"CI = x̄ ± Z_(α/2) × (σ/√n)  [known σ]   or   x̄ ± t_(α/2, n-1) × (s/√n)  [unknown σ]",
detail:"Use Z (1.96 for 95%) when σ is known or n is large. Use t-distribution when σ is unknown (most real situations). Wider CI = less precision. To halve the CI width, quadruple the sample size (n)."},

{phase:"Analyze",cat:"Inferential Statistics",
q:"Common Z-scores for confidence intervals — what are the key values?",
a:"90% CI: Z = 1.645. 95% CI: Z = 1.96. 99% CI: Z = 2.576.",
detail:"These appear on the IASSC equation sheet. Memorize them anyway — they also appear in hypothesis testing critical values for large-sample proportion tests and in SPC control limit calculations (3σ = 99.73%)."},

// ── GAP FILL: Lean / Flow ─────────────────────────────────
{phase:"Define",cat:"Lean",
q:"What is Takt Time and how is it used?",
a:"The rate at which products must be completed to meet customer demand. Sets the pace of production — the heartbeat of a lean system.",
formula:"Takt Time = Available Production Time / Customer Demand Rate",
detail:"Example: 480 min/day ÷ 240 units/day = 2 min/unit takt time. If a process step takes longer than takt time, it is a bottleneck. Takt time is used to balance workload across stations in a lean flow."},

{phase:"Define",cat:"Lean",
q:"What is Process Cycle Efficiency (PCE)?",
a:"The ratio of value-added time to total lead time — a measure of how much of the total process time actually adds value for the customer.",
formula:"PCE = Value-Added Time / Total Lead Time × 100%",
detail:"Lean manufacturing benchmark: PCE > 25% is considered good. Most traditional batch processes have PCE < 5% (over 95% of time is waste). PCE improvement is a primary goal of VSM future-state design."},

{phase:"Define",cat:"Lean",
q:"What is Little's Law and how is it applied?",
a:"The fundamental relationship between WIP, throughput, and lead time in any stable process.",
formula:"WIP = Throughput Rate × Lead Time  (or  Lead Time = WIP / Throughput Rate)",
detail:"To reduce lead time: either reduce WIP or increase throughput. Reducing WIP is usually easier. A process with 50 units in process and a throughput of 10/day has a lead time of 5 days. Applies to any queue-based system."},

{phase:"Define",cat:"Lean",
q:"What is the Theory of Constraints (TOC) and how does it relate to Lean Six Sigma?",
a:"TOC states every system has at least one constraint (bottleneck) limiting output. The 5-step process: Identify the constraint → Exploit it → Subordinate everything else → Elevate it → Repeat.",
detail:"In Lean Six Sigma: find the bottleneck (VSM/takt time analysis), then apply Six Sigma tools to reduce variation at the constraint before adding capacity. Fixing non-constraints before the constraint is wasted effort."},

// ── GAP FILL: Define tools additional ─────────────────────
{phase:"Define",cat:"Process Tools",
q:"What are KPIVs and KPOVs?",
a:"KPIV = Key Process Input Variables (the critical x's that drive output). KPOV = Key Process Output Variables (the Y metrics customers care about).",
detail:"Identified through SIPOC, X-Y diagrams, and fishbone analysis. The entire purpose of DMAIC is to identify which KPIVs control the KPOVs, then optimize and control those inputs. Directly tied to Y=f(x)."},

{phase:"Define",cat:"Process Tools",
q:"What is an Affinity Diagram and when is it used?",
a:"A tool for organizing large volumes of brainstormed ideas into natural groupings based on their relationships — used to distill raw VoC data into themes or CTQ categories.",
detail:"Process: write each idea on a card, silently group cards by theme, then name each group. Used early in Define phase to make sense of many customer inputs. Also used in the CTQ Tree development process."},

// ── GAP FILL: ANOVA additional ────────────────────────────
{phase:"Analyze",cat:"Hypothesis Testing",
q:"What is Two-Way ANOVA and when is it used?",
a:"An ANOVA with TWO categorical independent variables (factors) — tests main effects of each factor and whether an INTERACTION exists between them.",
detail:"Example: testing the effect of both Temperature (Factor A) and Pressure (Factor B) on yield, plus whether Temperature × Pressure interaction is significant. With replication, you can estimate the interaction term. Without replication, you cannot."},

{phase:"Analyze",cat:"Hypothesis Testing",
q:"What are Degrees of Freedom (df) in statistical tests?",
a:"The number of independent values in a calculation — effectively, the amount of information available to estimate a parameter after constraints are applied.",
detail:"t-test: df = n−1. 2-sample t-test: df = n₁+n₂−2. One-Way ANOVA: df_Factor = k−1, df_Error = N−k. Chi-Square: df = (rows−1)(cols−1). More df = more reliable estimates = narrower CIs."},

// ── GAP FILL: Improve / Pilot ─────────────────────────────
{phase:"Improve",cat:"DOE",
q:"What is a Pilot Study in the Improve phase?",
a:"A small-scale test of the proposed solution before full implementation — validates that the solution works in real conditions and quantifies the improvement.",
detail:"Pilot results should confirm that: (1) the solution achieves the improvement target, (2) no negative unintended consequences, (3) the solution is operationally feasible. A failed pilot is valuable data — iterate before full rollout."},

{phase:"Improve",cat:"Regression",
q:"What are the assumptions of linear regression that must be verified?",
a:"Linearity (X-Y relationship is linear), Independence (residuals are independent), Normality (residuals are normally distributed), Equal Variance/Homoscedasticity (residuals have constant spread).",
detail:"Remembered by acronym LINE. Verified by: scatter plot (linearity), residuals vs. fitted plot (independence + equal variance), normal probability plot of residuals (normality). Violations require transformation or a different model."},

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
// getTier(i) returns 0=Unsorted | 1=Know It | 2=Good | 3=Shaky | 4=No Idea  (stored as string keys)
let tiers = {};
const STORAGE_KEY = 'ss_bb_tiers_v1';
const TIER_NAMES = ['Unsorted','Know It','Good','Shaky','No Idea'];
const TIER_COLORS = ['var(--t0)','var(--t1)','var(--t2)','var(--t3)','var(--t4)'];

function loadTiers() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const parsed = JSON.parse(s);
      tiers = {};
      Object.keys(parsed).forEach(k => { tiers[String(k)] = Number(parsed[k]); });
    }
  } catch(e) {}
  CARDS.forEach((_, i) => { if (tiers[String(i)] === undefined) tiers[String(i)] = 0; });
}
function saveTiers() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tiers)); } catch(e) {}
}
function getTier(i)        { return tiers[String(i)] !== undefined ? tiers[String(i)] : 0; }
function setTier(cardIdx, tier) {
  tiers[String(cardIdx)] = tier;
  saveTiers();
  updateAllCounts();
}

// ═══════════════════════════════════════════
//  FILTERS
// ═══════════════════════════════════════════
let activePhase = 'all';   // 'all' | 'Define' | 'Measure' | 'Analyze' | 'Improve' | 'Control'
let activeTier  = 'all';   // 'all' | '0' | '1' | '2' | '3' | '4'
let currentMode = 'study';

function getFilteredIndices() {
  return CARDS.map((c, i) => i).filter(i => {
    const phaseOk = activePhase === 'all' || CARDS[i].phase === activePhase;
    const tierOk  = activeTier  === 'all' || getTier(i) === parseInt(activeTier);
    return phaseOk && tierOk;
  });
}

function setPhaseFilter(phase) {
  activePhase = phase;
  document.querySelectorAll('.phase-btn').forEach(b => b.classList.toggle('active', b.dataset.phase === phase));
  document.querySelectorAll('.m-phase-btn').forEach(b => b.classList.toggle('active', b.dataset.phase === phase));
  rebuildDeck();
  updateStudyTitle();
  if (currentMode === 'browse') renderBrowse();
}
function setTierFilter(tier) {
  activeTier = tier;
  document.querySelectorAll('.tier-pill').forEach(b => b.classList.toggle('active', b.dataset.tier === tier));
  document.querySelectorAll('.m-tier-btn').forEach(b => b.classList.toggle('active', b.dataset.tier === tier));
  rebuildDeck();
  updateStudyTitle();
  if (currentMode === 'browse') renderBrowse();
}
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.querySelectorAll('.bnav-btn[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('view-study').style.display  = mode === 'study'  ? 'flex' : 'none';
  document.getElementById('view-browse').style.display = mode === 'browse' ? 'flex' : 'none';
  document.getElementById('view-stats').style.display  = mode === 'stats'  ? 'flex' : 'none';
  if (mode === 'browse') renderBrowse();
  if (mode === 'stats')  renderStats();
}

// ═══════════════════════════════════════════
//  DECK
// ═══════════════════════════════════════════
let deck = [];
let deckIdx = 0;
let isFlipped = false;

function rebuildDeck() {
  deck = getFilteredIndices();
  deckIdx = 0;
  renderCard();
}
function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  deckIdx = 0;
  renderCard();
  showToast('🔀 Deck shuffled');
}
function nextCard() {
  if (!deck.length) return;
  deckIdx = (deckIdx + 1) % deck.length;
  renderCard();
}
function prevCard() {
  if (!deck.length) return;
  deckIdx = (deckIdx - 1 + deck.length) % deck.length;
  renderCard();
}
function skipToNext() { nextCard(); }

// ═══════════════════════════════════════════
//  RENDER STUDY CARD
// ═══════════════════════════════════════════
function renderCard() {
  const wrap = document.getElementById('study-wrap');
  // progress
  const total = deck.length;
  const pct = total ? ((deckIdx + 1) / total * 100).toFixed(0) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = total ? `${deckIdx + 1}/${total}` : '0/0';

  if (!total) {
    wrap.innerHTML = `<div class="empty"><div style="font-size:2.5rem">🔍</div><div>No cards match this filter.</div></div>`;
    return;
  }

  isFlipped = false;
  const cardIdx = deck[deckIdx];
  const card = CARDS[cardIdx];
  const tier = getTier(cardIdx);

  wrap.innerHTML = `
    <div class="card-scene" onclick="flipCard()">
      <div class="card-inner" id="card-inner">
        <div class="card-face">
          <div class="card-top">
            <span class="card-phase-tag ${card.phase}">${card.phase}</span>
            <span class="card-cat">${card.cat}</span>
          </div>
          <div class="card-q">${card.q}</div>
          <div class="flip-hint">click to reveal · <kbd style="font-family:'DM Mono',monospace;font-size:.65rem;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;">space</kbd></div>
        </div>
        <div class="card-face card-back">
          <div class="card-top">
            <span class="card-phase-tag ${card.phase}">${card.phase}</span>
            <span class="card-cat" style="font-style:italic;color:var(--text-dim)">Answer</span>
          </div>
          <div class="card-a">
            <div class="ans-main">${card.a}</div>
            ${card.detail ? `<div class="ans-detail">${card.detail}</div>` : ''}
            ${card.formula ? `<div class="ans-formula">${card.formula}</div>` : ''}
            ${CARD_SVGS[cardIdx] ? CARD_SVGS[cardIdx] : ''}
          </div>
        </div>
      </div>
    </div>

    <div class="sort-wrap" id="sort-wrap" style="opacity:0;pointer-events:none;transition:opacity .3s;">
      <div class="sort-label">HOW WELL DO YOU KNOW THIS? &nbsp;·&nbsp; <kbd style="font-family:'DM Mono',monospace;font-size:.62rem;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;">1</kbd>–<kbd style="font-family:'DM Mono',monospace;font-size:.62rem;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;">4</kbd></div>
      <div class="sort-btns">
        <button class="sort-btn ${tier===1?'current-tier':''}" data-t="1" onclick="sortCard(1)">
          <span class="sort-icon">🎯</span>
          <span class="sort-name">Know It</span>
          <span class="sort-key">[1]</span>
        </button>
        <button class="sort-btn ${tier===2?'current-tier':''}" data-t="2" onclick="sortCard(2)">
          <span class="sort-icon">👍</span>
          <span class="sort-name">Good</span>
          <span class="sort-key">[2]</span>
        </button>
        <button class="sort-btn ${tier===3?'current-tier':''}" data-t="3" onclick="sortCard(3)">
          <span class="sort-icon">🤔</span>
          <span class="sort-name">Shaky</span>
          <span class="sort-key">[3]</span>
        </button>
        <button class="sort-btn ${tier===4?'current-tier':''}" data-t="4" onclick="sortCard(4)">
          <span class="sort-icon">❌</span>
          <span class="sort-name">No Idea</span>
          <span class="sort-key">[4]</span>
        </button>
      </div>
    </div>
  `;
}

function flipCard() {
  isFlipped = !isFlipped;
  const inner = document.getElementById('card-inner');
  if (inner) inner.classList.toggle('flipped', isFlipped);
  const sw = document.getElementById('sort-wrap');
  if (sw) { sw.style.opacity = isFlipped ? '1' : '0'; sw.style.pointerEvents = isFlipped ? 'all' : 'none'; }
}

function sortCard(tier) {
  if (!deck.length) return;
  const cardIdx = deck[deckIdx];
  setTier(cardIdx, tier);
  // advance to next without rebuilding deck (keep position)
  if (deck.length > 1) {
    deckIdx = (deckIdx + 1) % deck.length;
  }
  renderCard();
  const names = ['','Know It ✓','Good 👍','Shaky 🤔','No Idea ❌'];
  showToast(`Sorted: ${names[tier]}`);
}

// ═══════════════════════════════════════════
//  BROWSE VIEW
// ═══════════════════════════════════════════
function renderBrowse() {
  const search = (document.getElementById('search-input')?.value || '').toLowerCase();
  let indices = getFilteredIndices();
  if (search) {
    indices = indices.filter(i => {
      const c = CARDS[i];
      return c.q.toLowerCase().includes(search) ||
             c.a.toLowerCase().includes(search) ||
             (c.detail||'').toLowerCase().includes(search) ||
             c.cat.toLowerCase().includes(search);
    });
  }

  const TIER_LABEL = ['Unsorted','Know It','Good','Shaky','No Idea'];
  const grid = document.getElementById('browse-grid');
  if (!indices.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;padding:40px 0;">No cards match.</div>`;
    return;
  }
  grid.innerHTML = indices.map(i => {
    const c = CARDS[i];
    const t = getTier(i);
    return `<div class="bc" data-tier="${t}" onclick="openModal(${i})">
      <div class="bc-q">${c.q}</div>
      <div class="bc-a">${c.a.substring(0, 85)}${c.a.length > 85 ? '…' : ''}</div>
      <div class="bc-footer">
        <span class="tag ${c.phase}">${c.phase}</span>
        <span class="tag" style="background:var(--surface2);color:var(--text-dim)">${c.cat}</span>
        <span class="tier-tag" data-tier="${t}">${TIER_LABEL[t]}</span>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
//  RESORT MODAL
// ═══════════════════════════════════════════
let modalCardIdx = null;
function openModal(cardIdx) {
  modalCardIdx = cardIdx;
  const c = CARDS[cardIdx];
  document.getElementById('modal-q').textContent = c.q;
  // highlight current tier
  document.querySelectorAll('.modal-tier-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.t) === getTier(cardIdx));
  });
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalCardIdx = null;
}
function applyModalTier(tier) {
  if (modalCardIdx === null) return;
  setTier(modalCardIdx, tier);
  renderBrowse();
  closeModal();
  const names = ['Unsorted','Know It ✓','Good 👍','Shaky 🤔','No Idea ❌'];
  showToast(`Moved to: ${names[tier]}`);
}
// close modal on background click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ═══════════════════════════════════════════
//  STATS VIEW
// ═══════════════════════════════════════════
function renderStats() {
  const total = CARDS.length;
  const counts = [0,0,0,0,0];
  CARDS.forEach((_, i) => counts[getTier(i)]++);
  const sorted = total - counts[0];
  const pct = total ? Math.round(sorted / total * 100) : 0;

  const PHASES = ['Define','Measure','Analyze','Improve','Control'];
  // phase × tier matrix
  const matrix = {};
  PHASES.forEach(p => { matrix[p] = [0,0,0,0,0]; });
  CARDS.forEach((c, i) => { if (matrix[c.phase]) matrix[c.phase][getTier(i)]++; });

  const TIER_COLORS_CSS = ['var(--t0)','var(--t1)','var(--t2)','var(--t3)','var(--t4)'];
  const TIER_NAMES_S = ['Unsorted','Know It','Good','Shaky','No Idea'];

  document.getElementById('stats-content').innerHTML = `
    <div class="stats-top">
      <div class="stat-box"><div class="sl">Total Cards</div><div class="sv" style="color:var(--accent)">${total}</div></div>
      <div class="stat-box"><div class="sl">Sorted</div><div class="sv" style="color:var(--t2)">${sorted}</div></div>
      <div class="stat-box"><div class="sl">Unsorted</div><div class="sv" style="color:var(--t0)">${counts[0]}</div></div>
      <div class="stat-box"><div class="sl">% Complete</div><div class="sv" style="color:var(--accent)">${pct}%</div></div>
    </div>

    <div class="sidebar-label" style="margin-bottom:10px;">Tier Breakdown</div>
    <div class="tier-overview" style="margin-bottom:24px;">
      ${[1,2,3,4].map(t => `
        <div class="tier-box">
          <div class="tb-name" style="color:${TIER_COLORS_CSS[t]}">${TIER_NAMES_S[t]}</div>
          <div class="tb-val" style="color:${TIER_COLORS_CSS[t]}">${counts[t]}</div>
          <div style="font-size:.7rem;color:var(--text-dim);margin-bottom:6px;">${total ? Math.round(counts[t]/total*100) : 0}%</div>
          <div class="tb-bar"><div class="tb-fill" style="width:${total?counts[t]/total*100:0}%;background:${TIER_COLORS_CSS[t]}"></div></div>
        </div>`).join('')}
      <div class="tier-box">
        <div class="tb-name" style="color:var(--t0)">Unsorted</div>
        <div class="tb-val" style="color:var(--t0)">${counts[0]}</div>
        <div style="font-size:.7rem;color:var(--text-dim);margin-bottom:6px;">${total ? Math.round(counts[0]/total*100) : 0}%</div>
        <div class="tb-bar"><div class="tb-fill" style="width:${total?counts[0]/total*100:0}%;background:var(--t0)"></div></div>
      </div>
    </div>

    <div class="sidebar-label" style="margin-bottom:10px;">Phase × Tier Matrix</div>
    <div class="phase-matrix">
      <div class="pm-header">
        <div class="pm-cell">Phase</div>
        ${[1,2,3,4,0].map(t=>`<div class="pm-cell" style="color:${TIER_COLORS_CSS[t]};text-align:center">${TIER_NAMES_S[t]}</div>`).join('')}
      </div>
      ${PHASES.map(p => `
        <div class="pm-row">
          <div class="pm-phase" style="color:var(--${p.toLowerCase()})">${p}</div>
          ${[1,2,3,4,0].map(t=>`<div class="pm-count" style="color:${TIER_COLORS_CSS[t]}">${matrix[p][t]||0}</div>`).join('')}
        </div>`).join('')}
    </div>
  `;
}

// ═══════════════════════════════════════════
//  COUNTS & BADGES
// ═══════════════════════════════════════════
function updateAllCounts() {
  const total = CARDS.length;
  const counts = [0,0,0,0,0];
  CARDS.forEach((_, i) => counts[getTier(i)]++);

  // Desktop pills
  document.getElementById('pill-all').textContent = total;
  for (let t = 0; t <= 4; t++) document.getElementById('pill-' + t).textContent = counts[t];

  // Mobile pills (same data, separate elements)
  document.getElementById('mpill-all').textContent = total;
  for (let t = 0; t <= 4; t++) document.getElementById('mpill-' + t).textContent = counts[t];

  const PHASES = ['Define','Measure','Analyze','Improve','Control'];
  document.getElementById('pb-all').textContent = total;
  PHASES.forEach(p => {
    const n = getFilteredByPhase(p).length;
    document.getElementById('pb-' + p).textContent = n;
  });
}
function getFilteredByPhase(phase) {
  return CARDS.map((c,i) => ({c,i})).filter(({c}) => c.phase === phase);
}

// ═══════════════════════════════════════════
//  STUDY TITLE
// ═══════════════════════════════════════════
function updateStudyTitle() {
  const TIER_NAMES_FULL = ['Unsorted','Know It','Good','Shaky','No Idea'];
  const phase = activePhase === 'all' ? 'All Phases' : activePhase + ' Phase';
  const tier  = activeTier  === 'all' ? 'All Tiers'  : TIER_NAMES_FULL[parseInt(activeTier)];
  document.getElementById('study-title').textContent = `${phase} · ${tier}`;
}

// ═══════════════════════════════════════════
//  RESET
// ═══════════════════════════════════════════
function confirmReset() {
  // 1. Nuke every possible localStorage key this app has ever used
  try {
    ['ss_bb_tiers_v1', 'ss_bb_v2', 'ss_bb_state'].forEach(k => localStorage.removeItem(k));
  } catch(e) {}

  // 2. Rebuild tiers in memory — every card = 0 (Unsorted)
  tiers = {};
  CARDS.forEach((_, i) => { tiers[String(i)] = 0; });
  saveTiers();

  // 3. Reset filter state variables
  activeTier  = 'all';
  activePhase = 'all';

  // 4. Force-update every pill count directly
  const total = CARDS.length;
  // Desktop pills
  document.getElementById('pill-all').textContent = total;
  document.getElementById('pill-0').textContent   = total;
  document.getElementById('pill-1').textContent   = 0;
  document.getElementById('pill-2').textContent   = 0;
  document.getElementById('pill-3').textContent   = 0;
  document.getElementById('pill-4').textContent   = 0;
  // Mobile pills
  document.getElementById('mpill-all').textContent = total;
  document.getElementById('mpill-0').textContent   = total;
  document.getElementById('mpill-1').textContent   = 0;
  document.getElementById('mpill-2').textContent   = 0;
  document.getElementById('mpill-3').textContent   = 0;
  document.getElementById('mpill-4').textContent   = 0;

  // 5. Force-update pill active styling
  document.querySelectorAll('.tier-pill').forEach(b  => b.classList.toggle('active', b.dataset.tier  === 'all'));
  document.querySelectorAll('.m-tier-btn').forEach(b  => b.classList.toggle('active', b.dataset.tier  === 'all'));
  document.querySelectorAll('.phase-btn').forEach(b   => b.classList.toggle('active', b.dataset.phase === 'all'));
  document.querySelectorAll('.m-phase-btn').forEach(b => b.classList.toggle('active', b.dataset.phase === 'all'));
  document.querySelectorAll('.bnav-btn[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === 'study'));

  // 6. Force-update phase badges
  ['Define','Measure','Analyze','Improve','Control'].forEach(p => {
    const n = CARDS.filter(c => c.phase === p).length;
    document.getElementById('pb-' + p).textContent = n;
  });
  document.getElementById('pb-all').textContent = total;

  // 7. Rebuild deck and title
  updateStudyTitle();
  deck = CARDS.map((_, i) => i);
  deckIdx = 0;
  renderCard();

  // 8. Refresh whichever view is active
  if (currentMode === 'browse') renderBrowse();
  if (currentMode === 'stats')  renderStats();

  showToast('\u2705 All ' + total + ' cards reset to Unsorted');
}

// ═══════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (currentMode !== 'study') return;
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key === ' ' || e.key === 'f') { e.preventDefault(); flipCard(); }
  else if (e.key === '1') sortCard(1);
  else if (e.key === '2') sortCard(2);
  else if (e.key === '3') sortCard(3);
  else if (e.key === '4') sortCard(4);
  else if (e.key === 'ArrowRight' || e.key === 'n') nextCard();
  else if (e.key === 'ArrowLeft'  || e.key === 'p') prevCard();
  else if (e.key === 'Escape') closeModal();
});

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
loadTiers();
updateAllCounts();
rebuildDeck();
updateStudyTitle();

// ═══════════════════════════════════════════
//  EXPORT / IMPORT
// ═══════════════════════════════════════════
function exportProgress() {
  const data = { tiers: tiers, exportedAt: new Date().toISOString(), cardCount: CARDS.length };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'sixsigma_progress_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ Progress exported');
}

function importProgress(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.tiers) { showToast('❌ Invalid file'); return; }
      tiers = {};
      Object.keys(data.tiers).forEach(k => { tiers[String(k)] = Number(data.tiers[k]); });
      // Fill in any cards not in the saved file (new cards added since export)
      CARDS.forEach((_, i) => { if (tiers[String(i)] === undefined) tiers[String(i)] = 0; });
      saveTiers();
      updateAllCounts();
      rebuildDeck();
      if (currentMode === 'browse') renderBrowse();
      if (currentMode === 'stats')  renderStats();
      showToast('✅ Progress imported');
    } catch(err) {
      showToast('❌ Could not read file');
    }
  };
  reader.readAsText(file);
  // Reset file input so same file can be re-imported if needed
  event.target.value = '';
}
</script>
